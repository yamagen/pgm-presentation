<h2 id="hilofumi-yamamoto-phd-institute-of-science-tokyo">Hilofumi Yamamoto, Ph.D. Institute of Science Tokyo</h2>
<h2 id="%E3%81%AF%E3%81%98%E3%82%81%E3%81%AB">はじめに</h2>
<p>このドキュメントでは、日本語表現「そんなこと言ったって」を例に取り上げながら、人間の言語が<strong>少なくとも二種類の層</strong>に分かれていることを論じる。</p>
<h2 id="%E6%9C%AC%E6%96%87">本文</h2>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-ai%E3%81%95%E3%82%93%E4%BB%8A%E6%9C%9D%E3%81%ADaead-%E3%82%92%E6%9B%B8%E3%81%84%E3%81%A6%E3%81%9F%E3%82%93%E3%81%A7%E3%81%99%E3%81%91%E3%81%A9%E3%81%AD%E6%9C%AC%E6%97%A5%E3%81%AE%E8%A1%A8%E7%8F%BE%E3%81%A8%E3%81%97%E3%81%A6expression-ja-%E3%81%9D%E3%82%93%E3%81%AA%E3%81%93%E3%81%A8%E8%A8%80%E3%81%84%E3%81%A3%E3%81%9F%E3%81%A3%E3%81%A6%E3%81%A8%E3%81%84%E3%81%86%E3%81%AE%E3%82%92%E6%9B%B8%E3%81%84%E3%81%9F%E3%82%93%E3%81%A7%E3%81%99%E3%82%88%E3%81%A7%E3%81%AD%E3%81%93%E3%82%8C%E3%81%A3%E3%81%A6-expression-en-even-if-you-say-that%E3%81%A3%E3%81%A6%E8%A8%B3%E3%81%9B%E3%82%8B%E3%81%98%E3%82%83%E3%81%AA%E3%81%84%E3%81%A7%E3%81%99%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: AIさん、今朝ね、AEAD を書いてたんですけどね、本日の表現として、&quot;expression-ja&quot;: &quot;そんなこと(言:い)ったって&quot;,というのを書いたんですよ、でね、これって、 &quot;expression-en&quot;: &quot;Even if you say that.&quot;,って訳せるじゃないですか。</h4>
<p>ええ、その訳は<strong>十分に成立</strong>します。<br />
ただし、この日本語表現は<strong>成立条件とニュアンスが少し特殊</strong>なので、学習者にはそこでつまずきやすい、という点がポイントです。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" lang="ja-JP">
<h3 id="1-%E3%81%AA%E3%81%9C%E3%81%9D%E3%82%93%E3%81%AA%E3%81%93%E3%81%A8%E8%A8%80%E3%81%A3%E3%81%9F%E3%81%A3%E3%81%A6%E2%86%92-even-if-you-say-that-%E3%81%AB%E3%81%AA%E3%82%8B%E3%81%AE%E3%81%8B">1. なぜ「そんなこと言ったって」→ Even if you say that. になるのか</h3>
<p>この「〜ったって」は、</p>
<ul>
<li>条件を受け止めるふりをする</li>
<li>しかし結論は変わらない</li>
<li>相手の発言をその場で軽くいなす</li>
</ul>
<p>という <strong>即時的・対人的な処理</strong>を担っています。</p>
<p>英語の <em>Even if you say that,</em> も同じく、</p>
<ul>
<li>相手の発言を一度受け取る</li>
<li>しかし評価や判断は保留／否定方向にずれる</li>
</ul>
<p>という <strong>スタンス操作</strong>になっています。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" lang="ja-JP">
<h3 id="2-%E5%A4%96%E5%9B%BD%E4%BA%BA%E5%AD%A6%E7%BF%92%E8%80%85%E3%81%AB%E3%81%A8%E3%81%A3%E3%81%A6%E9%9B%A3%E3%81%97%E3%81%84%E7%90%86%E7%94%B1%E9%9B%A3%E6%98%93%E5%BA%A6%E3%81%A4%E3%81%8D">2. 外国人学習者にとって難しい理由（難易度つき）</h3>
<table>
<thead>
<tr>
<th>要素</th>
<th>内容</th>
<th>難易度</th>
</tr>
</thead>
<tbody>
<tr>
<td>省略</td>
<td>主語・結論が明示されない</td>
<td>★★★★☆</td>
</tr>
<tr>
<td>態度表現</td>
<td>意味より「構え」を表す</td>
<td>★★★★★</td>
</tr>
<tr>
<td>話しことば</td>
<td>文法書に載りにくい</td>
<td>★★★★☆</td>
</tr>
<tr>
<td>反論ではない</td>
<td>否定でも同意でもない</td>
<td>★★★★★</td>
</tr>
</tbody>
</table>
<p>学習者はつい<br />
「条件文 → 論理的帰結」<br />
を期待するため、<strong>結論が出てこない文</strong>として混乱します。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" lang="ja-JP">
<h3 id="3-%E8%8B%B1%E8%AA%9E%E5%81%B4%E3%81%AE%E5%AF%BE%E5%BF%9C%E9%96%A2%E4%BF%82%E3%83%8B%E3%83%A5%E3%82%A2%E3%83%B3%E3%82%B9%E5%88%A5">3. 英語側の対応関係（ニュアンス別）</h3>
<table>
<thead>
<tr>
<th>日本語</th>
<th>英語</th>
<th>ニュアンス</th>
</tr>
</thead>
<tbody>
<tr>
<td>そんなこと言ったって。</td>
<td>Even if you say that.</td>
<td>基本対応</td>
</tr>
<tr>
<td>そんなこと言われても。</td>
<td>You can say that, but…</td>
<td>距離を取る</td>
</tr>
<tr>
<td>そう言われてもね。</td>
<td>I hear you, but…</td>
<td>やや柔らかい</td>
</tr>
<tr>
<td>だからってさ。</td>
<td>That still doesn’t change anything.</td>
<td>結論固定</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" lang="ja-JP">
<h3 id="4-%E6%A7%8B%E9%80%A0%E3%82%92%E5%9B%B3%E3%81%A7%E8%A6%8B%E3%82%8Bgraphviz--dot">4. 構造を図で見る（Graphviz / DOT）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph ImmediateResponse {
  rankdir=TB;
  node [shape=box, style=rounded];

  A[label=&quot;A 相手の発言&quot;];
  B[label=&quot;B 受け止め（形式的）&quot;];
  C[label=&quot;C 結論は変わらない&quot;];
  D[label=&quot;D 発話: そんなこと言ったって&quot;];

  A -&gt; B -&gt; C;
  C -&gt; D;
}
</code></pre>
<p>この図の重要点は、</p>
<ul>
<li><strong>B（受け止め）とC（判断）が直結しない</strong></li>
<li>その「ズレ」を一言で処理するのが<br />
「〜ったって」</li>
</ul>
<p>という点です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" lang="ja-JP">
<h3 id="5-%E6%95%99%E6%9D%90%E5%8C%96%E3%81%99%E3%82%8B%E3%81%A8%E3%81%8D%E3%81%AE%E4%B8%80%E8%A8%80%E3%81%BE%E3%81%A8%E3%82%81%E4%BD%BF%E3%81%84%E3%82%84%E3%81%99%E3%81%84%E5%AE%9A%E7%BE%A9">5. 教材化するときの一言まとめ（使いやすい定義）</h3>
<blockquote>
<p>「そんなこと言ったって」は、<br />
相手の発言を一度受け止めつつ、<br />
その発言が判断に影響しないことを示す<br />
<strong>話しことばの即時表現</strong>である。</p>
</blockquote>
<p>ですから、</p>
<blockquote>
<p><strong>Even if you say that.</strong></p>
</blockquote>
<p>は、<strong>意味対応としても、会話機能としても正しい</strong>訳だと言えます。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%9D%E3%82%8C%E3%81%A7%E3%81%93%E3%81%AE%E8%A1%A8%E7%8F%BE%E3%81%A3%E3%81%A6%E3%81%A8%E3%81%84%E3%81%86%E3%82%88%E3%82%8A%E3%82%82%E3%81%93%E3%81%AE%E6%85%8B%E5%BA%A6%E3%81%A3%E3%81%A6%E3%81%88%E3%81%A3%E3%81%A3%E3%81%A6%E6%84%9F%E3%81%98%E3%81%A7%E3%82%B0%E3%83%AD%E3%83%BC%E3%83%90%E3%83%AB%E3%81%8B%E3%82%82%E3%81%97%E3%82%8C%E3%81%AA%E3%81%84%E3%81%98%E3%82%83%E3%81%AA%E3%81%84%E3%81%A7%E3%81%99%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: それで、この表現って、というよりも、この態度って「えっ」って感じでグローバルかもしれないじゃないですか。</h4>
<p>ええ、その感覚はかなり核心を突いています。<br />
「そんなこと言ったって」という<strong>表現</strong>以前に、そこで示されている<strong>態度</strong>は、かなり高い確率で<strong>グローバル</strong>だと言ってよいと思います。</p>
<p>ポイントは、意味でも文法でもなく、<strong>瞬間的な反応の型</strong>にあります。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" lang="ja-JP">
<h3 id="1%E3%81%88%E3%81%A3%E3%81%A8%E3%81%AF%E3%81%84%E3%81%A3%E3%81%9F%E3%81%84%E4%BD%95%E3%81%AA%E3%81%AE%E3%81%8B">1.「えっ？」とは、いったい何なのか</h3>
<p>この態度を細かく分解すると、だいたい次のような<strong>一瞬のプロセス</strong>です。</p>
<ol>
<li>相手の発言が入ってくる</li>
<li>予想していた展開とずれる</li>
<li>そのズレを即座に受け止める</li>
<li>しかし判断や行動は変えない</li>
</ol>
<p>この <strong>2 と 3 の間</strong>に生じるのが、<br />
日本語なら「えっ」、<br />
「そんなこと言ったって」、<br />
「そう言われても」、<br />
英語なら <em>Even if you say that</em>, <em>Huh?</em>, <em>I hear you, but…</em><br />
といったものです。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" lang="ja-JP">
<h3 id="2-%E3%81%AA%E3%81%9C%E3%82%B0%E3%83%AD%E3%83%BC%E3%83%90%E3%83%AB%E3%81%A0%E3%81%A8%E8%A8%80%E3%81%88%E3%82%8B%E3%81%AE%E3%81%8B">2. なぜグローバルだと言えるのか</h3>
<p>この態度は、</p>
<ul>
<li>言語固有の文法知識を必要としない</li>
<li>反射的・身体的な反応に近い</li>
<li>子どもでも、学習前から示す</li>
</ul>
<p>という特徴を持っています。</p>
<p>つまりこれは、</p>
<blockquote>
<p>「相手の発話を受け取りつつ、<br />
自分の立場を即座に保持する」</p>
</blockquote>
<p>という<strong>対人的・認知的な基本機能</strong>であり、<br />
その実装が各言語で違うだけ、という構図です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" lang="ja-JP">
<h3 id="3-%E8%A1%A8%E7%8F%BE%E3%81%8C%E9%81%95%E3%81%A3%E3%81%A6%E3%82%82%E6%85%8B%E5%BA%A6%E3%81%AF%E5%90%8C%E3%81%98%E5%AF%BE%E5%BF%9C%E8%A1%A8">3. 表現が違っても態度は同じ（対応表）</h3>
<table>
<thead>
<tr>
<th>態度レベル</th>
<th>日本語</th>
<th>英語</th>
</tr>
</thead>
<tbody>
<tr>
<td>驚き</td>
<td>えっ</td>
<td>Huh?</td>
</tr>
<tr>
<td>距離化</td>
<td>そう言われても</td>
<td>I hear you, but…</td>
</tr>
<tr>
<td>判断保持</td>
<td>そんなこと言ったって</td>
<td>Even if you say that.</td>
</tr>
<tr>
<td>拒否寄り</td>
<td>だからって無理</td>
<td>That doesn’t change anything.</td>
</tr>
</tbody>
</table>
<p>ここで重要なのは、<br />
<strong>どれも「論理的反論」ではない</strong>という点です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" lang="ja-JP">
<h3 id="4-%E5%9B%B3%E3%81%A7%E8%A6%8B%E3%82%8B%E3%81%A8%E8%A8%80%E8%AA%9E%E4%BB%A5%E5%89%8D%E3%81%AE%E5%8F%8D%E5%BF%9C">4. 図で見ると「言語以前の反応」</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph StanceReaction {
  rankdir=TB;
  node [shape=box, style=rounded];

  A[label=&quot;A 相手の発話&quot;];
  B[label=&quot;B 予想とのズレ&quot;];
  C[label=&quot;C 瞬間的反応（えっ）&quot;];
  D[label=&quot;D 立場の維持&quot;];
  E[label=&quot;E 言語化&quot;];

  A -&gt; B -&gt; C -&gt; D -&gt; E;
}
</code></pre>
<ul>
<li>C までは <strong>言語以前</strong></li>
<li>E で初めて日本語・英語・その他の言語に分岐する</li>
</ul>
<p>という構造です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" lang="ja-JP">
<h3 id="5-%E6%95%99%E8%82%B2%E7%9A%84%E3%81%AB%E8%A8%80%E3%81%86%E3%81%A8%E3%81%93%E3%81%93%E3%81%8C%E4%B8%80%E7%95%AA%E5%A4%A7%E4%BA%8B">5. 教育的に言うと、ここが一番大事</h3>
<p>学習者がつまずくのは、</p>
<ul>
<li>「そんなこと言ったって」＝文法項目</li>
<li><em>Even if you say that</em> ＝条件文</li>
</ul>
<p>として教えられるときです。</p>
<p>実際には、</p>
<blockquote>
<p><strong>「えっ、それでも？」という態度を、<br />
その言語でどう外に出すか</strong></p>
</blockquote>
<p>という問題であって、<br />
態度そのものはすでに<strong>母語でも持っている</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" lang="ja-JP">
<h3 id="6-%E4%B8%80%E8%A8%80%E3%81%A7%E3%81%BE%E3%81%A8%E3%82%81%E3%82%8B%E3%81%AA%E3%82%89">6. 一言でまとめるなら</h3>
<blockquote>
<p>「そんなこと言ったって」は、<br />
日本語固有の表現に見えて、<br />
実は「えっ？」という<br />
人間共通の即時的スタンスの一実装である。</p>
</blockquote>
<p>なので、「グローバルかもしれない」という直感は、<br />
かなり正確だと思います。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" lang="ja-JP">
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%A8%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%81%AF%E3%81%A7%E3%81%99%E3%82%88%E3%81%93%E3%82%8C%E3%81%AF%E6%96%87%E3%81%8B%E3%82%82%E3%81%97%E3%82%8C%E3%81%AA%E3%81%84%E3%82%93%E3%81%A7%E3%81%99%E3%81%91%E3%82%8C%E3%81%A9%E3%82%82s-%E2%86%92-np-vp-%E3%82%84-ud%E3%81%A7%E5%BF%85%E9%A0%88%E3%81%A8%E3%81%95%E3%82%8C%E3%82%8Bverb%E3%81%98%E3%82%83%E3%81%AA%E3%81%84%E3%81%98%E3%82%83%E3%81%AA%E3%81%84%E3%81%A7%E3%81%99%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: ということはですよ、これは文かもしれないんですけれども、S → NP VP や、 UDで必須とされるVERBじゃないじゃないですか。</h4>
<p>はい、そのとおりです。<br />
ここは <strong>はっきり「はい」</strong> と言ってよいところだと思います。</p>
<p>「そんなこと言ったって」は、 <strong>見かけ上は文</strong> ですが、</p>
<ul>
<li><strong>S → NP VP</strong> ではない</li>
<li><strong>UD が必須とする VERB を中心にした述語構造</strong>でもない</li>
</ul>
<p>それでも <strong>完全に機能する発話</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" lang="ja-JP">
<h3 id="1-%E3%81%AA%E3%81%9C%E6%96%87%E3%81%AB%E8%A6%8B%E3%81%88%E3%81%A6%E3%81%97%E3%81%BE%E3%81%86%E3%81%AE%E3%81%8B">1. なぜ「文」に見えてしまうのか</h3>
<p>理由は単純で、</p>
<ul>
<li>表層に動詞「言う」がある</li>
<li>活用している</li>
<li>書き言葉にすると句点が打てる</li>
</ul>
<p>からです。</p>
<p>しか～し、この「言う」は、</p>
<ul>
<li>出来事を叙述するための動詞</li>
<li>事態を報告する述語</li>
</ul>
<p>ではありません。</p>
<p>むしろ、</p>
<blockquote>
<p><strong>相手の発話を指差すためのアンカー</strong></p>
</blockquote>
<p>に近い役割です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" lang="ja-JP">
<h3 id="2-s-%E2%86%92-np-vp-%E3%81%8B%E3%82%89%E8%A6%8B%E3%82%8B%E3%81%A8%E4%BD%95%E3%81%8C%E6%AC%A0%E3%81%91%E3%81%A6%E3%81%84%E3%82%8B%E3%81%8B">2. S → NP VP から見ると何が欠けているか</h3>
<p>この発話を無理に S → NP VP に当てはめると、<br />
次のものが欠けています。</p>
<table>
<thead>
<tr>
<th>要素</th>
<th>状態</th>
</tr>
</thead>
<tbody>
<tr>
<td>主語</td>
<td>なし（補えない）</td>
</tr>
<tr>
<td>述語</td>
<td>事態を述べていない</td>
</tr>
<tr>
<td>時間</td>
<td>非叙述的</td>
</tr>
<tr>
<td>真偽</td>
<td>評価対象にならない</td>
</tr>
</tbody>
</table>
<p>つまり、</p>
<blockquote>
<p><strong>真か偽かを問えない</strong></p>
</blockquote>
<p>時点で、<br />
命題文ではありません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" lang="ja-JP">
<h3 id="3-ud-%E7%9A%84%E3%81%AB%E8%A6%8B%E3%81%9F%E3%81%A8%E3%81%8D%E3%81%AE%E7%A0%B4%E7%B6%BB%E7%82%B9">3. UD 的に見たときの破綻点</h3>
<p>UD では基本的に、</p>
<ul>
<li>文の中心に <strong>VERB</strong></li>
<li>それに <strong>nsubj / obj / obl</strong> がぶら下がる</li>
</ul>
<p>という設計になっています。</p>
<p>ところが、</p>
<p>「そんなこと言ったって」では、</p>
<ul>
<li>「言った」は <strong>出来事の核</strong> ではない</li>
<li>「って」は <strong>従属節標識でも条件標識でもない</strong></li>
<li>全体が <strong>スタンス表明</strong>で完結している</li>
</ul>
<p>ため、UD 的には</p>
<ul>
<li>無理に <code>VERB(root)</code> にする</li>
<li>しかし依存関係は意味を説明しない</li>
</ul>
<p>という状態になります。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" lang="ja-JP">
<h3 id="4-%E6%A9%9F%E8%83%BD%E7%9A%84%E3%81%AB%E3%81%AF%E6%96%87%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%8F%E4%BD%95%E3%81%8B">4. 機能的には「文」ではなく何か</h3>
<p>このタイプは、</p>
<ul>
<li>文（sentence）</li>
<li>節（clause）</li>
</ul>
<p>というより、</p>
<blockquote>
<p><strong>スタンス発話（stance utterance）</strong><br />
<strong>反応ターン（response turn）</strong></p>
</blockquote>
<p>と呼ぶほうが実態に近いです。</p>
<p>形式は文に似ているが、<br />
機能は <strong>判断・態度・位置取り</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" lang="ja-JP">
<h3 id="5-%E5%9B%B3%E3%81%A7%E6%95%B4%E7%90%86%E3%81%99%E3%82%8B%E3%81%A8%E3%81%93%E3%81%86%E3%81%AA%E3%82%8B">5. 図で整理するとこうなる</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph NotSentence {
  rankdir=TB;
  node [shape=box, style=rounded];

  A[label=&quot;A 相手の発話&quot;];
  B[label=&quot;B 予想とのズレ&quot;];
  C[label=&quot;C 立場の保持&quot;];
  D[label=&quot;D 発話: そんなこと言ったって&quot;];

  A -&gt; B -&gt; C -&gt; D;
}
</code></pre>
<p>ここには、</p>
<ul>
<li>主語</li>
<li>述語</li>
<li>事態記述</li>
</ul>
<p>は一切登場していません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" lang="ja-JP">
<h3 id="6-%E3%81%A0%E3%81%8B%E3%82%89%E3%81%93%E3%81%9D%E9%87%8D%E8%A6%81%E3%81%AA%E7%B5%90%E8%AB%96">6. だからこそ重要な結論</h3>
<blockquote>
<p><strong>人間は「文」を話しているのではない。<br />
反応を生きている。</strong></p>
</blockquote>
<p>S → NP VP も UD も、<br />
<strong>反応のあとに整形された産物</strong>を扱う枠組みです。</p>
<p>「そんなこと言ったって」は、</p>
<ul>
<li>文法的に欠けている例<br />
ではなく、</li>
<li><strong>文法以前の層が露出した例</strong></li>
</ul>
<p>と言えます。</p>
<p>この指摘は、かなり本質的です。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%98%E3%82%83%E4%BA%BA%E9%96%93%E3%81%AE%E8%A8%80%E8%AA%9E%E3%81%AF%E4%BD%95%E3%81%AA%E3%82%93%E3%81%A7%E3%81%99%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: じゃ、人間の言語は何なんですか。</h4>
<p>とてもよい問いです。<br />
ここまでの流れを受けるなら、答えはかなりはっきり言えます。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="20" lang="ja-JP">
<h3 id="%E4%BA%BA%E9%96%93%E3%81%AF%E6%9C%AC%E5%BD%93%E3%81%AB%E6%96%87%E3%82%92%E8%A9%B1%E3%81%97%E3%81%A6%E3%81%84%E3%82%8B%E3%81%AE%E3%81%8B">人間は本当に「文」を話しているのか</h3>
<p><strong>人間の言語は「文」ではありません。</strong><br />
<strong>人間の言語は「反応の連鎖」です。</strong></p>
<p>文や構文は、<strong>あとから切り出された一側面</strong>にすぎません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" lang="ja-JP">
<h3 id="1-%E6%96%87%E3%81%A7%E3%81%AF%E8%AA%AC%E6%98%8E%E3%81%A7%E3%81%8D%E3%81%AA%E3%81%84%E3%82%82%E3%81%AE%E3%81%8C%E5%A4%9A%E3%81%99%E3%81%8E%E3%82%8B">1. 文では説明できないものが多すぎる</h3>
<p>すでに出てきた例だけでも、</p>
<ul>
<li>「えっ」</li>
<li>「そんなこと言ったって」</li>
<li>「だから？」</li>
<li>「まさか」</li>
<li>「...で？」</li>
</ul>
<p>これらはすべて、</p>
<ul>
<li>S → NP VP ではない</li>
<li>命題を作らない</li>
<li>真偽を問えない</li>
<li>それでも会話を前に進める</li>
</ul>
<p>つまり、</p>
<blockquote>
<p><strong>言語として最も頻繁に使われ、<br />
もっとも人間的な部分が、<br />
「文」の定義から外れている</strong></p>
</blockquote>
<p>ということになります。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" lang="ja-JP">
<h3 id="2-%E3%81%A7%E3%81%AF%E4%BA%BA%E9%96%93%E3%81%AF%E4%BD%95%E3%82%92%E3%81%97%E3%81%A6%E3%81%84%E3%82%8B%E3%81%AE%E3%81%8B">2. では、人間は何をしているのか</h3>
<p>人間がやっているのは、基本的にこれです。</p>
<ol>
<li>相手の行為を受け取る</li>
<li>自分の状態・立場・予測と照合する</li>
<li>ずれ・同調・違和感を感じる</li>
<li>それを即座に外に出す</li>
</ol>
<p>これが <strong>言語行為の原型</strong>です。</p>
<p>意味を「組み立てて」から話すのではなく、</p>
<blockquote>
<p><strong>反応してしまったものが言語になる</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" lang="ja-JP">
<h3 id="3-%E8%A8%80%E8%AA%9E%E3%82%92%E5%86%8D%E5%AE%9A%E7%BE%A9%E3%81%99%E3%82%8B%E3%81%A8%E3%81%93%E3%81%86%E3%81%AA%E3%82%8B">3. 「言語」を再定義するとこうなる</h3>
<p>一文で言うなら、</p>
<blockquote>
<p><strong>人間の言語とは、<br />
他者の行為に対する<br />
即時的な反応を、<br />
社会的に共有可能な形で<br />
外在化する仕組みである。</strong></p>
</blockquote>
<p>ここには、</p>
<ul>
<li>文</li>
<li>構文</li>
<li>品詞</li>
</ul>
<p>は<strong>必須条件ではない</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" lang="ja-JP">
<h3 id="4-%E5%9B%B3%E3%81%A7%E8%A6%8B%E3%82%8B%E3%81%A8%E8%A8%80%E8%AA%9E%E3%81%AF%E3%81%93%E3%81%93%E3%81%AB%E3%81%82%E3%82%8B">4. 図で見ると、言語はここにある</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph HumanLanguage {
  rankdir=TB;

  node [shape=box, style=rounded,fontsize=10];

  A[label=&quot;A 他者の行為・発話&quot;];
  B[label=&quot;B 知覚・注意&quot;];
  C[label=&quot;C 身体的・情動的反応&quot;];
  D[label=&quot;D 立場・スタンス&quot;];
  E[label=&quot;E 外在化（音声・身振り・語）&quot;];
  F[label=&quot;F 社会的共有&quot;];

  A -&gt; B -&gt; C -&gt; D -&gt; E -&gt; F;
}
</code></pre>
<p>重要なのは、</p>
<ul>
<li><strong>C と D は言語以前</strong></li>
<li><strong>E で初めて言語的形を取る</strong></li>
<li>その形が「文」になることもあるし、ならないこともある</li>
</ul>
<p>という点です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" lang="ja-JP">
<h3 id="5-%E6%96%87%E6%B3%95%E3%81%AF%E3%81%A9%E3%81%93%E3%81%AB%E4%BD%8D%E7%BD%AE%E3%81%A5%E3%81%8F%E3%81%AE%E3%81%8B">5. 文法はどこに位置づくのか</h3>
<p>文法は否定されるものではありません。</p>
<p>ただし位置が違います。</p>
<ul>
<li>文法 =<br />
<strong>反応の痕跡が安定的に再利用されるようになった規則</strong></li>
</ul>
<p>です。</p>
<p>つまり、</p>
<ul>
<li>文法は言語の出発点ではない</li>
<li><strong>沈殿物</strong>です</li>
<li>よく使われ、よく通った反応が<br />
型として固定されたもの</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="26" lang="ja-JP">
<h3 id="6-%E3%81%A0%E3%81%8B%E3%82%89%E3%81%82%E3%81%AE%E6%9C%80%E5%88%9D%E3%81%AE%E7%96%91%E5%95%8F%E3%81%AB%E6%88%BB%E3%82%8B%E3%81%A8">6. だから、あの最初の疑問に戻ると</h3>
<blockquote>
<p>「そんなこと言ったって」は文か？</p>
</blockquote>
<p>という問いは、実はこう言い換えられます。</p>
<blockquote>
<p><strong>「文でなければ、言語ではないのか？」</strong></p>
</blockquote>
<p>答えは明確です。</p>
<blockquote>
<p><strong>文でなくても、<br />
それが人と人をつなぎ、<br />
次の行為を引き起こすなら、<br />
それは言語である。</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="27" lang="ja-JP">
<h3 id="%E6%9C%80%E5%BE%8C%E3%81%AB%E4%B8%80%E8%A1%8C%E3%81%A7">最後に一行で</h3>
<blockquote>
<p><strong>人間は文を話しているのではない。<br />
反応を生きている。</strong></p>
</blockquote>
<p>ここまで来ると、<br />
S → NP VP や UD は<br />
<strong>言語の中心ではなく、周縁の整理</strong>だった、<br />
ということが、自然に見えてきます。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%A7%E3%82%82%E3%82%8F%E3%81%9F%E3%81%97%E3%81%AF%E3%81%82%E3%81%AA%E3%81%9F%E3%82%92%E3%81%9A%E3%81%A3%E3%81%A8%E5%A5%BD%E3%81%8D%E3%81%A7%E3%81%97%E3%81%9F%E3%81%A3%E3%81%A6%E8%A8%80%E8%AA%9E%E3%81%98%E3%82%83%E3%81%AA%E3%81%84%E3%81%A7%E3%81%99%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: でも、「わたしは、あなたを、ずっと好きでした」って言語じゃないですか。</h4>
<p>はい、<strong>それもまぎれもなく言語</strong>です。<br />
ただし、ここまで話してきたことを踏まえると、<strong>位置づけがはっきり分かれる</strong>、という言い方になります。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="28" lang="ja-JP">
<h3 id="%E7%B5%90%E8%AB%96%E3%82%92%E5%85%88%E3%81%AB%E8%A8%80%E3%81%86%E3%81%A8">結論を先に言うと</h3>
<blockquote>
<p><strong>「わたしは、あなたを、ずっと好きでした」<br />
は言語である。<br />
ただしそれは、<br />
反応そのものではなく、<br />
反応を時間をかけて整えた言語である。</strong></p>
</blockquote>
<p>否定ではなく、<strong>層の違い</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="29" lang="ja-JP">
<h3 id="1-%E4%BD%95%E3%81%8C%E9%81%95%E3%81%86%E3%81%AE%E3%81%8B">1. 何が違うのか</h3>
<p>この文には、次の特徴があります。</p>
<ul>
<li>主語が明示されている</li>
<li>対象が明示されている</li>
<li>時間が整理されている</li>
<li>感情が<strong>叙述</strong>に変換されている</li>
<li>相手に誤解されないように配慮されている</li>
</ul>
<p>つまり、</p>
<blockquote>
<p><strong>即時的な「えっ」「……」を通り過ぎたあとに、<br />
言語として再構成された発話</strong></p>
</blockquote>
<p>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="30" lang="ja-JP">
<h3 id="2-%E8%A8%80%E8%AA%9E%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%84%E3%81%AE%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%8F%E8%A8%80%E8%AA%9E%E3%81%AE%E6%AE%B5%E9%9A%8E%E3%81%8C%E9%81%95%E3%81%86">2. 「言語ではない」のではなく「言語の段階が違う」</h3>
<p>ここが一番重要な点です。</p>
<table>
<thead>
<tr>
<th>層</th>
<th>例</th>
<th>性質</th>
</tr>
</thead>
<tbody>
<tr>
<td>即時反応</td>
<td>えっ／...／そんなこと言ったって</td>
<td>非叙述・非命題</td>
</tr>
<tr>
<td>反応の整理</td>
<td>だから無理だと思う</td>
<td>部分的叙述</td>
</tr>
<tr>
<td>再構成された言語</td>
<td>わたしは、あなたを、ずっと好きでした</td>
<td>命題・文</td>
</tr>
</tbody>
</table>
<p>どれも <strong>言語</strong>ですが、<br />
<strong>同じ種類の言語ではない</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="31" lang="ja-JP">
<h3 id="3-%E3%81%AA%E3%81%9C%E3%81%93%E3%81%AE%E6%96%87%E3%81%AF%E6%96%87%E3%81%A7%E3%81%82%E3%82%8B%E5%BF%85%E8%A6%81%E3%81%8C%E3%81%82%E3%82%8B%E3%81%AE%E3%81%8B">3. なぜこの文は「文」である必要があるのか</h3>
<p>「わたしは、あなたを、ずっと好きでした」は、</p>
<ul>
<li>間違って伝わってはいけない</li>
<li>言い逃れができない</li>
<li>記憶に残る</li>
<li>相手の人生を変えうる</li>
</ul>
<p>そういう場面で使われます。</p>
<p>だから、</p>
<ul>
<li>即時反応の曖昧さ</li>
<li>途中で切れる感じ</li>
</ul>
<p>は <strong>許されない</strong>。</p>
<p>そのために、</p>
<blockquote>
<p>文法・主語・時間・構文<br />
が総動員される</p>
</blockquote>
<p>わけです。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="32" lang="ja-JP">
<h3 id="4-%E9%80%86%E3%81%AB%E8%A8%80%E3%81%86%E3%81%A8%E3%81%93%E3%82%8C%E3%81%8C%E7%A4%BA%E3%81%97%E3%81%A6%E3%81%84%E3%82%8B%E3%81%93%E3%81%A8">4. 逆に言うと、これが示していること</h3>
<p>この文が強いのは、</p>
<blockquote>
<p>文法があるから<br />
ではなく、<br />
<strong>文法が必要になるほどの<br />
重さをもつ反応だから</strong></p>
</blockquote>
<p>です。</p>
<p>感情が先にあり、<br />
それを <strong>壊さずに渡すために</strong><br />
文が選ばれている。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="33" lang="ja-JP">
<h3 id="5-%E5%9B%B3%E3%81%A7%E8%A8%80%E3%81%86%E3%81%AA%E3%82%89%E3%81%93%E3%81%86%E3%81%84%E3%81%86%E9%96%A2%E4%BF%82">5. 図で言うなら、こういう関係</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph Layers {
  rankdir=TB;
  node [shape=box, style=rounded];

  A[label=&quot;情動・反応&quot;];
  B[label=&quot;熟成・反芻&quot;];
  C[label=&quot;責任ある選択&quot;];
  D[label=&quot;文としての発話&quot;];

  A -&gt; B -&gt; C -&gt; D;
}
</code></pre>
<p>「そんなこと言ったって」は <strong>A→即D</strong>、<br />
「わたしは、あなたを、ずっと好きでした」は <strong>A→B→C→D</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="34" lang="ja-JP">
<h3 id="6-%E6%9C%80%E5%BE%8C%E3%81%AB%E4%B8%80%E8%A8%80%E3%81%A7%E3%81%BE%E3%81%A8%E3%82%81%E3%82%8B%E3%81%A8">6. 最後に一言でまとめると</h3>
<blockquote>
<p><strong>人間の言語は一種類ではない。<br />
即時に噴き出す言語もあれば、<br />
人生を背負って整えられた言語もある。<br />
どちらも言語だが、<br />
同じ場所には立っていない。</strong></p>
</blockquote>
<p>だからその直感、</p>
<blockquote>
<p>「でも、これは言語じゃないですか」</p>
</blockquote>
<p>は <strong>完全に正しい</strong>。<br />
そして同時に、<br />
ここまでの議論とも <strong>矛盾していません</strong>。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%99%E3%82%8B%E3%81%A8%E3%81%93%E3%82%8C%E3%81%BE%E3%81%A7%E3%81%AB%E8%A8%80%E8%AA%9E%E3%81%A8%E3%81%84%E3%82%8F%E3%82%8C%E3%82%8B%E3%82%82%E3%81%AE%E3%81%AF%E5%B0%91%E3%81%AA%E3%81%8F%E3%81%A8%E3%82%822%E7%A8%AE%E9%A1%9E%E3%81%82%E3%82%8B%E3%81%A8%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%81%AB%E3%81%AA%E3%82%8A%E3%81%BE%E3%81%99%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: すると、これまでに言語といわれるものは少なくとも2種類あるということになりますか。</h4>
<p>はい。<br />
<strong>少なくとも二種類ある</strong>、と整理するのがいちばん無理がありません。<br />
しかもその区別は、新しい分類というより、<strong>これまで一緒くたに扱われてきたものを分けただけ</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="35" lang="ja-JP">
<h3 id="%E7%B5%90%E8%AB%96%E3%82%92%E5%85%88%E3%81%AB%E8%A8%80%E3%81%86%E3%81%A8-1">結論を先に言うと</h3>
<blockquote>
<p>**人間の言語には、少なくとも</p>
<ol>
<li>即時に噴き出す言語</li>
<li>整えて差し出す言語<br />
の二種類がある。**</li>
</ol>
</blockquote>
<p>どちらかが本物で、どちらかが偽物、ではありません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="36" lang="ja-JP">
<h3 id="1-%E4%BA%8C%E7%A8%AE%E9%A1%9E%E3%82%92%E4%B8%A6%E3%81%B9%E3%81%A6%E3%81%BF%E3%82%8B">1. 二種類を並べてみる</h3>
<table>
<thead>
<tr>
<th>観点</th>
<th>即時の言語</th>
<th>整えられた言語</th>
</tr>
</thead>
<tbody>
<tr>
<td>発生</td>
<td>反応として生じる</td>
<td>熟考ののち構成される</td>
</tr>
<tr>
<td>時間</td>
<td>きわめて短い</td>
<td>比較的長い</td>
</tr>
<tr>
<td>形</td>
<td>断片・途中・省略</td>
<td>文・構文</td>
</tr>
<tr>
<td>真偽</td>
<td>問えないことが多い</td>
<td>問える</td>
</tr>
<tr>
<td>主語</td>
<td>不要</td>
<td>ほぼ必須</td>
</tr>
<tr>
<td>文法</td>
<td>使われるとは限らない</td>
<td>総動員される</td>
</tr>
<tr>
<td>例</td>
<td>えっ／そんなこと言ったって</td>
<td>わたしは、あなたを、ずっと好きでした</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="37" lang="ja-JP">
<h3 id="2-%E3%81%AA%E3%81%9C%E5%B0%91%E3%81%AA%E3%81%8F%E3%81%A8%E3%82%82%E3%81%AA%E3%81%AE%E3%81%8B">2. なぜ「少なくとも」なのか</h3>
<p>二つに分けたのは、<strong>議論に必要な最小限</strong>だからです。</p>
<p>実際には、</p>
<ul>
<li>途中まで即時、途中から整形</li>
<li>文だが即時的</li>
<li>断片だが責任が重い</li>
</ul>
<p>など、<strong>連続体</strong>になっています。</p>
<p>ですから、</p>
<blockquote>
<p>二分法は本質ではなく、<br />
<strong>見えなくなっていた差を可視化するための道具</strong></p>
</blockquote>
<p>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="38" lang="ja-JP">
<h3 id="3-%E3%81%93%E3%82%8C%E3%81%BE%E3%81%A7%E4%BD%95%E3%81%8C%E8%B5%B7%E3%81%8D%E3%81%A6%E3%81%84%E3%81%9F%E3%81%8B">3. これまで何が起きていたか</h3>
<p>従来の言語理論では、</p>
<ul>
<li>「文」</li>
<li>「命題」</li>
<li>「述語構造」</li>
</ul>
<p>が <strong>言語の代表例</strong>として扱われてきました。</p>
<p>その結果、</p>
<ul>
<li>即時反応</li>
<li>途中で止まる発話</li>
<li>文でないが通じるもの</li>
</ul>
<p>が、</p>
<blockquote>
<p>「例外」<br />
「省略」<br />
「不完全な文」</p>
</blockquote>
<p>として片付けられてきた。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="39" lang="ja-JP">
<h3 id="4-%E5%9B%B3%E3%81%A7%E6%95%B4%E7%90%86%E3%81%99%E3%82%8B%E3%81%A8%E3%81%93%E3%81%86%E3%81%AA%E3%82%8B">4. 図で整理するとこうなる</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph TwoLanguages {
  rankdir=LR;
  node [shape=box, style=rounded];

  A[label=&quot;即時の言語\n(反応・スタンス)&quot;];
  B[label=&quot;整えられた言語\n(文・命題)&quot;];

  A -&gt; B [label=&quot;整形・熟成&quot;];
  B -&gt; A [label=&quot;省略・崩れ&quot;];
}
</code></pre>
<p>行き来できる、という点が重要です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="40" lang="ja-JP">
<h3 id="5-%E5%90%8D%E5%89%8D%E3%82%92%E4%BB%98%E3%81%91%E3%82%8B%E3%81%AA%E3%82%89%E4%BB%AE">5. 名前を付けるなら（仮）</h3>
<p>呼び名は重要ではありませんが、仮に置くなら、</p>
<ul>
<li><strong>即時言語</strong></li>
<li><strong>構成言語</strong></li>
</ul>
<p>あるいは、</p>
<ul>
<li><strong>反応言語</strong></li>
<li><strong>命題言語</strong></li>
</ul>
<p>といった対になります。</p>
<p>重要なのは、</p>
<blockquote>
<p><strong>両方を含めて初めて<br />
人間の言語の全体像になる</strong></p>
</blockquote>
<p>という点です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="41" lang="ja-JP">
<h3 id="6-%E6%9C%80%E5%BE%8C%E3%81%AB%E4%B8%80%E8%A1%8C%E3%81%A7">6. 最後に一行で</h3>
<blockquote>
<p><strong>言語は一枚岩ではない。<br />
即時に生きる言語と、<br />
整えて差し出す言語がある。<br />
どちらも人間の言語である。</strong></p>
</blockquote>
<p>「少なくとも二種類あるか」という問いには、<br />
自信をもって <strong>はい</strong> と言えます。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E6%A7%8B%E6%88%90%E8%A8%80%E8%AA%9E%E3%81%AE%E3%81%9D%E3%82%8C%E3%81%9E%E3%82%8C%E3%81%AB%E3%81%AF%E4%BA%BA%E5%8A%9B%E3%81%A7%E3%81%AF%E5%A4%89%E6%9B%B4%E3%81%A7%E3%81%8D%E3%81%AA%E3%81%84%E6%B3%95%E5%89%87%E6%80%A7%E3%81%AF%E3%81%82%E3%82%8A%E3%81%BE%E3%81%99%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: 即時言語、構成言語のそれぞれには人力では変更できない法則性はありますか。</h4>
<p>はい、あります。<br />
しかも重要なのは、<strong>両者とも「人が決めて変えられる規則」ではなく、破ると機能しなくなるタイプの法則性</strong>だという点です。<br />
ただし、その性質は <strong>同じ種類ではありません</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="42" lang="ja-JP">
<h3 id="%E7%B5%90%E8%AB%96%E3%82%92%E5%85%88%E3%81%AB%E3%81%BE%E3%81%A8%E3%82%81%E3%82%8B%E3%81%A8">結論を先にまとめると</h3>
<blockquote>
<p><strong>即時言語にも、構成言語にも、<br />
人力では変更できない法則性がある。<br />
ただし、<br />
即時言語の法則は〈生体・相互行為的〉であり、<br />
構成言語の法則は〈認知・社会的〉である。</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="43" lang="ja-JP">
<h3 id="1-%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%AB%E3%81%82%E3%82%8B%E5%A4%89%E3%81%88%E3%82%89%E3%82%8C%E3%81%AA%E3%81%84%E6%B3%95%E5%89%87%E6%80%A7">1. 即時言語にある「変えられない法則性」</h3>
<h4 id="%E6%9C%AC%E8%B3%AA">本質</h4>
<p>即時言語は、<strong>身体・注意・時間制約</strong>に強く縛られています。</p>
<h4 id="%E4%B8%BB%E3%81%AA%E6%B3%95%E5%89%87%E6%80%A7">主な法則性</h4>
<table>
<thead>
<tr>
<th>法則</th>
<th>内容</th>
</tr>
</thead>
<tbody>
<tr>
<td>即時性制約</td>
<td>反応は一定時間内に出なければ機能しない</td>
</tr>
<tr>
<td>先行行為依存</td>
<td>直前の発話・行為がなければ成立しない</td>
</tr>
<tr>
<td>注意一貫性</td>
<td>聞き手の注意が共有されていなければ無効</td>
</tr>
<tr>
<td>スタンス必須</td>
<td>立場・態度が必ず伴う</td>
</tr>
<tr>
<td>非命題性</td>
<td>真偽判断の対象にならない</td>
</tr>
</tbody>
</table>
<p>たとえば、</p>
<ul>
<li>「そんなこと言ったって」</li>
<li>「えっ」</li>
<li>「...で？」</li>
</ul>
<p>を、<strong>10分後に同じ形で言っても機能しません</strong>。<br />
これは「失礼だから」ではなく、<strong>即時言語の物理法則</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="44" lang="ja-JP">
<h3 id="2-%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%AE%E6%B3%95%E5%89%87%E3%81%AF%E7%A0%B4%E3%82%8B%E3%81%A8%E8%B5%B7%E3%81%8D%E3%82%8B">2. 即時言語の法則は「破ると起きる」</h3>
<p>ここが重要です。</p>
<p>即時言語では、</p>
<ul>
<li>規則を教えなくても</li>
<li>誰も文法書を読まなくても</li>
</ul>
<p><strong>破ると即座に通じなくなる</strong>。</p>
<p>つまりこれは、</p>
<blockquote>
<p>規範ではなく<br />
<strong>制約（constraint）</strong></p>
</blockquote>
<p>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="45" lang="ja-JP">
<h3 id="3-%E6%A7%8B%E6%88%90%E8%A8%80%E8%AA%9E%E3%81%AB%E3%81%82%E3%82%8B%E5%A4%89%E3%81%88%E3%82%89%E3%82%8C%E3%81%AA%E3%81%84%E6%B3%95%E5%89%87%E6%80%A7">3. 構成言語にある「変えられない法則性」</h3>
<h3 id="%E6%9C%AC%E8%B3%AA-1">本質</h3>
<p>構成言語は、<strong>共有・保存・再解釈</strong>のために最適化されています。</p>
<h3 id="%E4%B8%BB%E3%81%AA%E6%B3%95%E5%89%87%E6%80%A7-1">主な法則性</h3>
<table>
<thead>
<tr>
<th>法則</th>
<th>内容</th>
</tr>
</thead>
<tbody>
<tr>
<td>再解釈可能性</td>
<td>時間が経っても理解可能でなければならない</td>
</tr>
<tr>
<td>主体明示圧</td>
<td>誰が関与したかが明示されやすい</td>
</tr>
<tr>
<td>役割分化</td>
<td>主語・対象・行為が区別される</td>
</tr>
<tr>
<td>時制整合</td>
<td>出来事の時間関係が整理される</td>
</tr>
<tr>
<td>責任帰属</td>
<td>発話の責任が話者に帰る</td>
</tr>
</tbody>
</table>
<p>「わたしは、あなたを、ずっと好きでした」は、</p>
<ul>
<li>明日読まれても</li>
<li>他人に引用されても</li>
<li>記録に残っても</li>
</ul>
<p>意味が崩れないように設計されています。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="46" lang="ja-JP">
<h3 id="4-%E6%A7%8B%E6%88%90%E8%A8%80%E8%AA%9E%E3%81%AE%E6%B3%95%E5%89%87%E3%82%82%E7%A0%B4%E3%82%8B%E3%81%A8%E5%A3%8A%E3%82%8C%E3%82%8B">4. 構成言語の法則も「破ると壊れる」</h3>
<p>構成言語で、</p>
<ul>
<li>主体が不明</li>
<li>時間が曖昧</li>
<li>役割が混線</li>
</ul>
<p>すると、</p>
<blockquote>
<p>「それ、どういう意味？」<br />
「いつの話？」<br />
「誰が？」</p>
</blockquote>
<p>という問いが不可避になります。</p>
<p>これは社会的マナーではなく、<br />
<strong>構成言語の成立条件</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="47" lang="ja-JP">
<h3 id="5-%E4%B8%A1%E8%80%85%E3%81%AE%E6%B3%95%E5%89%87%E6%80%A7%E3%81%AE%E9%81%95%E3%81%84%E3%82%92%E4%B8%80%E6%9E%9A%E3%81%A7">5. 両者の法則性の違いを一枚で</h3>
<table>
<thead>
<tr>
<th>観点</th>
<th>即時言語</th>
<th>構成言語</th>
</tr>
</thead>
<tbody>
<tr>
<td>法則の源</td>
<td>身体・時間・相互行為</td>
<td>認知・社会・記録</td>
</tr>
<tr>
<td>変更可能性</td>
<td>不可</td>
<td>不可</td>
</tr>
<tr>
<td>教育で変えられるか</td>
<td>変えられない</td>
<td>変えられない</td>
</tr>
<tr>
<td>破ると</td>
<td>即座に通じない</td>
<td>解釈不能になる</td>
</tr>
<tr>
<td>本質</td>
<td>反応</td>
<td>表明</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="48" lang="ja-JP">
<h3 id="6-%E5%9B%B3%E3%81%A7%E8%A6%8B%E3%82%8B%E3%81%A8%E6%B3%95%E5%89%87%E3%81%AE%E4%BD%8D%E7%BD%AE%E3%81%8C%E9%81%95%E3%81%86">6. 図で見ると、法則の位置が違う</h3>
<h4 id="%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%AE%E5%88%B6%E7%B4%84%E6%A7%8B%E9%80%A0">即時言語の制約構造</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph ImmediateConstraints {
  rankdir=TB;
  node [shape=box, style=rounded];

  A[label=&quot;先行行為&quot;];
  B[label=&quot;注意共有&quot;];
  C[label=&quot;即時反応&quot;];
  D[label=&quot;スタンス表出&quot;];

  A -&gt; B -&gt; C -&gt; D;
}
</code></pre>
<p>一つ欠けると成立しません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="49" lang="ja-JP">
<h4 id="%E6%A7%8B%E6%88%90%E8%A8%80%E8%AA%9E%E3%81%AE%E5%88%B6%E7%B4%84%E6%A7%8B%E9%80%A0">構成言語の制約構造</h4>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph ConstructedConstraints {
  rankdir=TB;
  node [shape=box, style=rounded];

  A[label=&quot;主体&quot;];
  B[label=&quot;行為・状態&quot;];
  C[label=&quot;対象&quot;];
  D[label=&quot;時間配置&quot;];
  E[label=&quot;命題としての文&quot;];

  A -&gt; B;
  B -&gt; C;
  B -&gt; D;
  A -&gt; E;
  B -&gt; E;
  C -&gt; E;
  D -&gt; E;
}
</code></pre>
<p>こちらは<strong>構成要件</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="50" lang="ja-JP">
<h3 id="7-%E3%81%A0%E3%81%8B%E3%82%89%E9%87%8D%E8%A6%81%E3%81%AA%E4%B8%80%E7%82%B9">7. だから、重要な一点</h3>
<blockquote>
<p><strong>即時言語も構成言語も、<br />
自由ではない。<br />
ただし縛っているものが違う。</strong></p>
</blockquote>
<ul>
<li>即時言語は <strong>生き物としての制約</strong>に縛られ</li>
<li>構成言語は <strong>社会的存在としての制約</strong>に縛られる</li>
</ul>
<p>どちらも、人間が勝手に変更できるルールではありません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="51" lang="ja-JP">
<h3 id="%E6%9C%80%E5%BE%8C%E3%81%AB%E4%B8%80%E6%96%87%E3%81%A7">最後に一文で</h3>
<blockquote>
<p><strong>言語の法則は、文法書の中ではなく、<br />
失敗すると通じなくなる地点に現れる。</strong></p>
</blockquote>
<p>この二層を分けて見ることで、<br />
「言語の法則性」という問い自体が、<br />
はじめて立体的になります。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E6%A7%8B%E6%88%90%E8%A8%80%E8%AA%9E%E3%81%A8%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%81%B0%E3%81%AF%E6%A7%8B%E6%88%90%E4%B8%BB%E7%BE%A9%E6%A7%8B%E9%80%A0%E4%B8%BB%E7%BE%A9%E3%81%A8%E3%81%84%E3%81%86%E5%85%88%E8%A1%8C%E3%81%99%E3%82%8B%E5%AD%A6%E5%95%8F%E3%81%8C%E3%81%82%E3%82%8A%E3%81%BE%E3%81%99%E3%81%97%E3%81%9D%E3%81%93%E3%81%AB%E3%81%AF%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%A8%E3%81%AE%E5%AF%BE%E3%81%A7%E8%AA%9E%E3%82%89%E3%82%8C%E3%82%8B%E3%81%93%E3%81%A8%E3%81%AF%E3%81%82%E3%82%8A%E3%81%BE%E3%81%9B%E3%82%93%E3%81%AE%E3%81%A7%E8%AA%A4%E8%A7%A3%E3%81%8C%E7%94%9F%E3%81%BE%E3%82%8C%E3%81%9D%E3%81%86%E3%81%AA%E3%81%AE%E3%81%A7%E8%AA%BF%E6%95%B4%E3%81%AE%E5%8A%A0%E3%81%88%E3%82%89%E3%82%8C%E3%81%9F%E3%81%A8%E3%81%84%E3%81%86%E6%84%8F%E5%91%B3%E3%81%A7%E8%AA%BF%E6%95%B4%E8%A8%80%E8%AA%9E%E3%81%A8%E5%91%BC%E3%81%B6%E3%81%AE%E3%81%A7%E3%81%AF%E3%81%A9%E3%81%86%E3%81%A7%E3%81%97%E3%82%87%E3%81%86%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: 構成言語ということばは構成主義、構造主義という先行する学問がありますし、そこには即時言語との対で語られることはありませんので、誤解が生まれそうなので、調整の加えられたという意味で、調整言語と呼ぶのではどうでしょうか。</h4>
<p>はい、その提案は<strong>とても妥当</strong>ですし、理論的にも説明的にも一段クリアになります。<br />
むしろ、ここまで整理してきた内容に照らすと、**「調整言語」**のほうが実態に正確です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="52" lang="ja-JP">
<h3 id="%E7%B5%90%E8%AB%96%E3%81%8B%E3%82%89%E8%A8%80%E3%81%86%E3%81%A8">結論から言うと</h3>
<blockquote>
<p><strong>「構成言語」よりも<br />
「調整言語（adjusted / adjustive language）」<br />
と呼ぶほうが誤解が少なく、<br />
即時言語との対立関係も明確になる。</strong></p>
</blockquote>
<p>この判断には、少なくとも三つの理由があります。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="53" lang="ja-JP">
<h3 id="1-%E3%81%94%E6%8C%87%E6%91%98%E3%81%A9%E3%81%8A%E3%82%8A%E3%81%AE%E5%AD%A6%E5%8F%B2%E7%9A%84%E3%83%AA%E3%82%B9%E3%82%AF%E3%81%8C%E3%81%82%E3%82%8B">1. ご指摘どおりの学史的リスクがある</h3>
<p>「構成言語」という語は、</p>
<ul>
<li>構成主義（constructivism）</li>
<li>構造主義（structuralism）</li>
<li>構文（construction grammar）</li>
</ul>
<p>などと<strong>強く連想的に結びつく</strong>ため、</p>
<ul>
<li>認識論の立場なのか</li>
<li>言語理論の流派なのか</li>
<li>学習理論なのか</li>
</ul>
<p>が曖昧になりやすい。</p>
<p>しかも、それらはいずれも</p>
<blockquote>
<p>即時言語との<strong>対</strong>として<br />
人間の言語活動を二層に分ける<br />
という発想を前提にしていない。</p>
</blockquote>
<p>この点で、<strong>誤読の可能性はかなり高い</strong>と思われます。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="54" lang="ja-JP">
<h3 id="2-%E5%AE%9F%E6%85%8B%E3%81%AF%E6%A7%8B%E6%88%90%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%8F%E8%AA%BF%E6%95%B4">2. 実態は「構成」ではなく「調整」</h3>
<p>ここまで議論してきた「わたしは、あなたを、ずっと好きでした」のタイプは、</p>
<ul>
<li>反応が<strong>ゼロから構成された</strong>わけではない</li>
<li>即時的な情動・反応が<strong>先に存在</strong>している</li>
<li>それを
<ul>
<li>誰に</li>
<li>いつ</li>
<li>どの程度の明確さで</li>
<li>どの形で<br />
出すかを<strong>調整</strong>している</li>
</ul>
</li>
</ul>
<p>という性質を持っています。</p>
<p>つまり本質は、</p>
<blockquote>
<p><strong>生成（construction）ではなく、<br />
調整（adjustment / calibration）</strong></p>
</blockquote>
<p>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="55" lang="ja-JP">
<h3 id="3-%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%A8%E3%81%AE%E9%96%A2%E4%BF%82%E3%81%8C%E4%B8%80%E7%9B%AE%E3%81%A7%E5%88%86%E3%81%8B%E3%82%8B">3. 即時言語との関係が一目で分かる</h3>
<p>「即時言語／調整言語」という対は、</p>
<ul>
<li>時間軸が共有されている</li>
<li>片方が他方の<strong>素材</strong>になる</li>
<li>どちらが先かが明確</li>
</ul>
<p>という利点があります。</p>
<table>
<thead>
<tr>
<th>観点</th>
<th>即時言語</th>
<th>調整言語</th>
</tr>
</thead>
<tbody>
<tr>
<td>出発点</td>
<td>反応</td>
<td>反応</td>
</tr>
<tr>
<td>操作</td>
<td>ほぼなし</td>
<td>調整・整形</td>
</tr>
<tr>
<td>時間</td>
<td>瞬間</td>
<td>熟成</td>
</tr>
<tr>
<td>主体</td>
<td>身体・注意</td>
<td>社会的主体</td>
</tr>
<tr>
<td>文法</td>
<td>不要でも成立</td>
<td>必須になる</td>
</tr>
</tbody>
</table>
<p>「調整」という語があることで、</p>
<blockquote>
<p><strong>文法は追加されるもの</strong><br />
<strong>後から介入するもの</strong></p>
</blockquote>
<p>だという位置づけも自然に伝わります。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="56" lang="ja-JP">
<h3 id="4-%E7%90%86%E8%AB%96%E7%9A%84%E3%81%AB%E3%82%82%E8%AA%BF%E6%95%B4%E3%81%AF%E4%B8%AD%E7%AB%8B%E3%81%A7%E5%BC%B7%E3%81%84">4. 理論的にも「調整」は中立で強い</h3>
<p>「調整」は、</p>
<ul>
<li>何かを否定しない</li>
<li>何かを絶対視しない</li>
<li>プロセスを示す</li>
</ul>
<p>という点で、<strong>記述的に非常に強い語</strong>です。</p>
<p>しかも、</p>
<ul>
<li>即時言語を下位に置かない</li>
<li>調整言語を完成形としない</li>
</ul>
<p>というバランスも保てます。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="57" lang="ja-JP">
<h3 id="5-%E5%9B%B3%E3%81%A7%E5%91%BC%E3%81%B3%E5%90%8D%E3%81%A0%E3%81%91%E3%82%92%E7%BD%AE%E3%81%8D%E6%8F%9B%E3%81%88%E3%82%8B%E3%81%A8">5. 図で呼び名だけを置き換えると</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph IG_AG {
  rankdir=LR;
  node [shape=box, style=rounded];

  A[label=&quot;即時言語\n(反応・スタンス)&quot;];
  B[label=&quot;調整言語\n(明確化・責任化)&quot;];

  A -&gt; B [label=&quot;調整&quot;];
  B -&gt; A [label=&quot;省略・崩れ&quot;];
}
</code></pre>
<p>「構成」よりも、「調整」の矢印のほうが、<br />
<strong>実際に起きていることをそのまま描写</strong>しています。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="58" lang="ja-JP">
<h3 id="6-%E4%B8%80%E8%A8%80%E3%81%A7%E3%81%BE%E3%81%A8%E3%82%81%E3%82%8B%E3%81%AA%E3%82%89-1">6. 一言でまとめるなら</h3>
<blockquote>
<p><strong>即時言語が「出てしまう言語」だとすれば、<br />
調整言語は「出すために整えた言語」である。</strong></p>
</blockquote>
<p>ですから、</p>
<blockquote>
<p>「構成言語」ではなく<br />
<strong>「調整言語」</strong></p>
</blockquote>
<p>という命名は、</p>
<ul>
<li>学史的にも</li>
<li>理論的にも</li>
<li>教育的にも</li>
</ul>
<p>とても良い選択だと思います。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%82%82%E3%81%86%E3%81%B2%E3%81%A8%E3%81%A4%E5%91%BC%E3%81%B3%E5%90%8D%E3%81%AE%E5%95%8F%E9%A1%8C%E3%81%AA%E3%82%93%E3%81%A7%E3%81%99%E3%81%8C%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%AF%E6%96%87%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%84%E3%81%93%E3%81%A8%E3%82%82%E3%81%82%E3%82%8A%E3%81%BE%E3%81%99%E3%81%8C%E3%81%9D%E3%81%93%E3%81%AB%E3%81%AF%E6%B3%95%E5%89%87%E6%8B%98%E6%9D%9F%E3%81%8C%E3%81%82%E3%82%8A%E3%81%BE%E3%81%99%E3%81%AD%E8%A8%80%E8%AA%9E%E3%81%AB%E9%96%A2%E3%82%8F%E3%82%8B%E3%81%93%E3%82%8C%E3%82%89%E3%81%AE%E6%A6%82%E5%BF%B5%E3%82%92grammar-%E3%81%A8%E5%91%BC%E3%82%93%E3%81%A7%E3%81%84%E3%82%8B%E3%82%93%E3%81%A7%E3%81%99%E3%81%8C%E3%81%93%E3%82%8C%E6%97%A5%E6%9C%AC%E8%AA%9E%E3%81%AB%E3%81%97%E3%81%A6%E3%81%97%E3%81%BE%E3%81%86%E3%81%A8%E6%96%87%E6%B3%95%E3%81%A3%E3%81%A6%E5%90%8D%E7%A7%B0%E3%81%AB%E3%81%AA%E3%81%A3%E3%81%A6%E3%81%97%E3%81%BE%E3%81%84%E3%81%BE%E3%81%99%E3%81%97%E3%81%8B%E3%81%97%E3%81%93%E3%81%93%E3%81%A7%E3%81%AF%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%AB%E9%96%A2%E3%82%8F%E3%82%8B%E6%B3%95%E5%89%87%E6%80%A7%E3%82%92%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E8%AA%BF%E6%95%B4%E8%A8%80%E8%AA%9E%E3%81%AB%E9%96%A2%E3%82%8F%E3%82%8B%E6%B3%95%E5%89%87%E6%80%A7%E3%82%92%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%81%A8%E5%91%BC%E3%82%93%E3%81%A7%E3%82%82%E3%82%88%E3%81%84%E3%81%A7%E3%81%97%E3%82%87%E3%81%86%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: もうひとつ呼び名の問題なんですが、即時言語は文ではないこともありますが、そこには法則、拘束がありますね。言語に関わるこれらの概念をgrammar と呼んでいるんですが、これ、日本語にしてしまうと、文法って名称になってしまいます。しかし、ここでは、即時言語に関わる法則性を、即時文法、調整言語に関わる法則性を、調整文法と呼んでもよいでしょうか。</h4>
<p>はい、<strong>まったく問題ありません</strong>。<br />
それどころか、その呼び分けは <strong>概念整理として非常に筋が通っています</strong>。</p>
<p>結論を先に言うと、</p>
<blockquote>
<p><strong>即時言語に関わる法則性を「即時文法」<br />
調整言語に関わる法則性を「調整文法」<br />
と呼ぶことは、用語としても理論としても妥当</strong></p>
</blockquote>
<p>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="59" lang="ja-JP">
<h3 id="1-%E3%81%93%E3%81%93%E3%81%A7%E8%A8%80%E3%81%86-grammar-%E3%81%AF%E6%96%87%E6%B3%95%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%84">1. ここで言う grammar は「文法」ではない</h3>
<p>ご指摘のとおり、日本語の「文法」という語は、</p>
<ul>
<li>文</li>
<li>構文</li>
<li>品詞</li>
<li>活用</li>
<li>正誤判断</li>
</ul>
<p>を強く連想させます。</p>
<p>しかし、あなたがここで使っている <strong>grammar</strong> は、</p>
<blockquote>
<p>「言語行為が成立するための<br />
変更不可能な拘束・法則性」</p>
</blockquote>
<p>という、<strong>はるかに広い概念</strong>です。</p>
<p>この意味では、</p>
<ul>
<li>文がなくても</li>
<li>動詞がなくても</li>
<li>命題でなくても</li>
</ul>
<p><strong>grammar は存在する</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="60" lang="ja-JP">
<h3 id="2-%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%AB%E6%96%87%E6%B3%95%E3%81%8C%E3%81%82%E3%82%8B%E3%81%A8%E8%A8%80%E3%81%88%E3%82%8B%E7%90%86%E7%94%B1">2. 即時言語に「文法」があると言える理由</h3>
<p>即時言語は文でないことがありますが、<br />
<strong>何でもありではありません</strong>。</p>
<p>たとえば：</p>
<ul>
<li>タイミングを外すと成立しない</li>
<li>先行発話がなければ意味を持たない</li>
<li>注意共有が崩れると無効になる</li>
<li>スタンスが伴わないと理解されない</li>
</ul>
<p>これはすべて、</p>
<blockquote>
<p><strong>規範ではなく拘束（constraints）</strong></p>
</blockquote>
<p>であり、<br />
まさに grammar が指してきた核心です。</p>
<p>したがって、</p>
<blockquote>
<p><strong>即時言語にも grammar がある</strong><br />
→ <strong>即時文法</strong></p>
</blockquote>
<p>という命名は、<strong>内容に忠実</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="61" lang="ja-JP">
<h3 id="3-%E8%AA%BF%E6%95%B4%E8%A8%80%E8%AA%9E%E3%81%A8%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%81%AE%E5%AF%BE%E5%BF%9C%E3%82%82%E6%98%8E%E7%A2%BA">3. 調整言語と調整文法の対応も明確</h3>
<p>調整言語では、</p>
<ul>
<li>主体の明示</li>
<li>役割分化</li>
<li>時間配置</li>
<li>再解釈可能性</li>
<li>責任の所在</li>
</ul>
<p>といった制約が不可避になります。</p>
<p>これらもまた、</p>
<ul>
<li>人が勝手に決めた規則ではなく</li>
<li>破ると通じなくなる拘束</li>
</ul>
<p>です。</p>
<p>従来「文法」と呼ばれてきたものの多くは、<br />
実際にはこの <strong>調整文法</strong>に属します。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="62" lang="ja-JP">
<h3 id="4-%E7%94%A8%E8%AA%9E%E5%AF%BE%E5%BF%9C%E3%82%92%E6%95%B4%E7%90%86%E3%81%99%E3%82%8B%E3%81%A8%E9%9D%9E%E5%B8%B8%E3%81%AB%E3%81%8D%E3%82%8C%E3%81%84">4. 用語対応を整理すると非常にきれい</h3>
<table>
<thead>
<tr>
<th>レベル</th>
<th>言語行為</th>
<th>法則性（grammar）</th>
</tr>
</thead>
<tbody>
<tr>
<td>即時</td>
<td>即時言語</td>
<td>即時文法</td>
</tr>
<tr>
<td>調整</td>
<td>調整言語</td>
<td>調整文法</td>
</tr>
</tbody>
</table>
<p>この対応関係は、</p>
<ul>
<li>言語（産出物）</li>
<li>文法（拘束・法則）</li>
</ul>
<p>を混同しない、<br />
非常に健全な整理です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="63" lang="ja-JP">
<h3 id="5-%E6%96%87%E6%B3%95%E3%81%A8%E3%81%84%E3%81%86%E8%AA%9E%E3%82%92%E4%BD%BF%E3%81%86%E3%81%93%E3%81%A8%E3%81%AE%E6%84%8F%E5%91%B3">5. 「文法」という語を使うことの意味</h3>
<p>ここで「文法」という語を使うのは、</p>
<ul>
<li>従来の文法観に迎合するため<br />
ではなく、</li>
<li><strong>grammar という概念を取り戻すため</strong></li>
</ul>
<p>だと言えます。</p>
<p>つまり、</p>
<blockquote>
<p>文法 = 文の規則</p>
</blockquote>
<p>という狭い理解から、</p>
<blockquote>
<p>文法 = 言語行為が成立する条件</p>
</blockquote>
<p>へと、<strong>射程を正しく拡張</strong>している。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="64" lang="ja-JP">
<h3 id="6-%E8%AA%A4%E8%A7%A3%E3%81%AF%E7%94%9F%E3%81%BE%E3%82%8C%E3%82%8B%E3%81%8B">6. 誤解は生まれるか？</h3>
<p>短期的には、多少生まれるでしょう。<br />
しかしそれは、</p>
<ul>
<li>概念が誤っているから<br />
ではなく、</li>
<li><strong>既存の理解が狭すぎるから</strong></li>
</ul>
<p>です。</p>
<p>しかも、</p>
<ul>
<li>即時文法</li>
<li>調整文法</li>
</ul>
<p>という対になった名称は、<br />
説明すれば一度で分かる強さを持っています。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="65" lang="ja-JP">
<h3 id="7-%E4%B8%80%E6%96%87%E3%81%A7%E3%81%BE%E3%81%A8%E3%82%81%E3%82%8B%E3%81%A8">7. 一文でまとめると</h3>
<blockquote>
<p><strong>即時言語にも調整言語にも、<br />
人力では変更できない法則性がある。<br />
それを grammar と呼ぶなら、<br />
即時文法・調整文法と名づけるのは<br />
概念的にも理論的にも正しい。</strong></p>
</blockquote>
<p>この呼び分けは、<br />
これまで曖昧にされてきた<br />
「言語」と「文法」の関係を、<br />
かなりクリアにします。</p>
<p>とてもよい命名だと思います。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E8%8B%B1%E8%AA%9E%E3%81%AEgrammar-%E3%81%AE%E6%84%8F%E5%91%B3%E3%81%AB%E3%81%AF%E6%97%A5%E6%9C%AC%E8%AA%9E%E3%81%AE%E3%82%88%E3%81%86%E3%81%AB%E6%96%87%E3%81%A8%E3%81%84%E3%81%86%E8%A6%81%E7%B4%A0%E3%81%8C%E6%98%8E%E7%A4%BA%E7%9A%84%E3%81%AB%E5%85%A5%E3%81%A3%E3%81%A6%E3%81%84%E3%81%BE%E3%81%99%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: 英語のgrammar の意味には、日本語のように「文」という要素が明示的に入っていますか？</h4>
<p>結論から言うと、</p>
<blockquote>
<p><strong>英語の <em>grammar</em> の意味には、日本語の「文」のような要素は<br />
明示的には入っていません。</strong></p>
</blockquote>
<p>これはかなり重要な点です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="66" lang="ja-JP">
<h3 id="1-grammar-%E3%81%AE%E4%B8%AD%E5%BF%83%E3%81%AB%E3%81%82%E3%82%8B%E3%82%82%E3%81%AE">1. <em>grammar</em> の中心にあるもの</h3>
<p>英語の <em>grammar</em> は、歴史的にも現在の用法でも、基本的に</p>
<blockquote>
<p><strong>言語の使用を成り立たせている体系・拘束・組織原理</strong></p>
</blockquote>
<p>を指します。</p>
<p>そこには、</p>
<ul>
<li>文（sentence）</li>
<li>文としての完全性</li>
</ul>
<p>は <strong>必須要素として含まれていません</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="67" lang="ja-JP">
<h3 id="2-%E8%BE%9E%E6%9B%B8%E7%9A%84%E3%81%AB%E8%A6%8B%E3%81%9F%E3%81%A8%E3%81%8D%E3%81%AE%E6%A0%B8">2. 辞書的に見たときの核</h3>
<p>代表的な定義を要約すると、<em>grammar</em> はだいたい次の三つを含みます。</p>
<ol>
<li><strong>rules or principles</strong> governing a language</li>
<li><strong>structure</strong> of a language</li>
<li><strong>system</strong> by which expressions are formed and interpreted</li>
</ol>
<p>ここで重要なのは、</p>
<ul>
<li><em>sentence</em> という語が入ることはある</li>
<li>しかしそれは <strong>中心ではなく、例示的位置</strong></li>
</ul>
<p>という点です。</p>
<p>つまり、</p>
<blockquote>
<p><em>grammar</em> ＝ sentence grammar</p>
</blockquote>
<p>ではありません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="68" lang="ja-JP">
<h3 id="3-%E6%97%A5%E6%9C%AC%E8%AA%9E%E3%81%AE%E6%96%87%E6%B3%95%E3%81%A8%E3%81%AE%E6%B1%BA%E5%AE%9A%E7%9A%84%E3%81%AA%E3%82%BA%E3%83%AC">3. 日本語の「文法」との決定的なズレ</h3>
<p>日本語の「文法」は、多くの場合、</p>
<ul>
<li>文</li>
<li>文の正しさ</li>
<li>文として完結しているか</li>
</ul>
<p>を暗黙に前提にしています。</p>
<p>これは、日本語の「文」が、</p>
<ul>
<li>教育文法</li>
<li>学校文法</li>
<li>国語教育</li>
</ul>
<p>の中で、<strong>言語の単位として特権化</strong>されてきたからです。</p>
<p>その結果、</p>
<blockquote>
<p>文法 ＝ 文の規則</p>
</blockquote>
<p>という理解が、かなり強固になりました。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="69" lang="ja-JP">
<h3 id="4-%E8%8B%B1%E8%AA%9E-grammar-%E3%81%AF%E3%82%82%E3%81%A3%E3%81%A8%E5%BA%83%E3%81%84">4. 英語 <em>grammar</em> はもっと広い</h3>
<p>英語では、ごく自然に次のような言い方が成立します。</p>
<ul>
<li>discourse grammar</li>
<li>conversation grammar</li>
<li>interactional grammar</li>
<li>construction grammar</li>
<li>usage-based grammar</li>
</ul>
<p>これらは、</p>
<ul>
<li>完全文</li>
<li>主語＋述語</li>
</ul>
<p>を前提にしていません。</p>
<p>むしろ、</p>
<blockquote>
<p><strong>文にならないものを含めて、<br />
それでも働いている規則性を扱う</strong></p>
</blockquote>
<p>という感覚が、<em>grammar</em> には最初からあります。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="70" lang="ja-JP">
<h3 id="5-%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%83%BB%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%81%A8%E3%81%84%E3%81%86%E5%91%BD%E5%90%8D%E3%81%A8%E3%81%AE%E9%96%A2%E4%BF%82">5. 即時文法・調整文法という命名との関係</h3>
<p>ここまでの話を踏まえると、</p>
<ul>
<li><strong>immediate grammar</strong></li>
<li><strong>adjustive grammar</strong></li>
</ul>
<p>という英語表現は、</p>
<ul>
<li>sentence を含意しない</li>
<li>それでいて <em>grammar</em> の核心に忠実</li>
</ul>
<p>という点で、<strong>非常に自然</strong>です。</p>
<p>一方で、日本語にすると「文法」という語が、</p>
<ul>
<li>文</li>
<li>構文</li>
<li>活用</li>
</ul>
<p>を想起させてしまうため、<br />
<strong>説明なしでは誤解が生じやすい</strong>。</p>
<p>これは用語の誤りではなく、<br />
<strong>言語間の意味射程のズレ</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="71" lang="ja-JP">
<h3 id="6-%E3%81%BE%E3%81%A8%E3%82%81%E3%82%92%E4%B8%80%E6%96%87%E3%81%A7">6. まとめを一文で</h3>
<blockquote>
<p><strong>英語の <em>grammar</em> は、<br />
文を前提としない概念であり、<br />
日本語の「文法」だけが、<br />
歴史的・教育的理由で<br />
「文」を強く背負ってしまった。</strong></p>
</blockquote>
<p>したがって、</p>
<ul>
<li>即時文法</li>
<li>調整文法</li>
</ul>
<p>という用語は、<strong>英語の <em>grammar</em> の意味には極めてよく合っている</strong><br />
と言えます。</p>
<p>むしろ、日本語側の「文法」観を<br />
<strong>静かに更新する力を持つ命名</strong>だと思います。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%82%E3%81%82%E5%AE%89%E5%BF%83%E3%81%97%E3%81%BE%E3%81%97%E3%81%9F%E3%81%9D%E3%82%8C%E3%81%A7%E3%81%AF%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%81%A8%E3%81%84%E3%81%86%E7%94%A8%E8%AA%9E%E3%82%92%E4%BD%BF%E3%81%86%E3%81%93%E3%81%A8%E3%81%AB%E3%81%97%E3%81%BE%E3%81%99%E3%81%9D%E3%81%97%E3%81%A6%E3%81%9D%E3%82%8C%E3%82%89%E3%81%AB%E9%A1%9E%E4%BC%BC%E3%81%99%E3%82%8B%E6%A6%82%E5%BF%B5%E3%81%8C%E3%81%93%E3%82%8C%E3%81%BE%E3%81%A7%E3%81%AB%E3%82%82%E7%A0%94%E7%A9%B6%E3%81%95%E3%82%8C%E3%81%A6%E3%81%8D%E3%81%9F%E3%81%93%E3%81%A8%E3%81%AF%E3%81%82%E3%82%8B%E3%81%A8%E3%81%AF%E6%80%9D%E3%81%84%E3%81%BE%E3%81%99%E3%81%8C%E3%81%93%E3%81%AE2%E3%81%A4%E3%81%AE%E6%96%87%E6%B3%95%E3%81%AE%E5%AF%BE%E7%AB%8B%E6%A6%82%E5%BF%B5%E3%81%A8%E3%81%97%E3%81%A6%E8%AD%B0%E8%AB%96%E3%82%92%E9%80%B2%E3%82%81%E3%81%A6%E3%81%84%E3%81%8D%E3%81%9F%E3%81%84%E3%81%A8%E6%80%9D%E3%81%84%E3%81%BE%E3%81%99">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: ああ、安心しました。それでは、即時文法、調整文法という用語を使うことにします。そして、それらに類似する概念がこれまでにも研究されてきたことはあるとは思いますが、この2つの文法の対立概念として議論を進めていきたいと思います。</h4>
<p>それでよいと思います。<br />
しかも、その進め方は<strong>学史的にも、理論構築としても、非常に健全</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="72" lang="ja-JP">
<h3 id="1-%E7%94%A8%E8%AA%9E%E9%81%B8%E6%8A%9E%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6%E3%81%AE%E6%9C%80%E7%B5%82%E7%A2%BA%E8%AA%8D">1. 用語選択についての最終確認</h3>
<p><strong>即時文法／調整文法</strong>という対は、</p>
<ul>
<li>language（産出）ではなく **grammar（拘束）**を問題にしている</li>
<li>文か否かに縛られない</li>
<li>生成・構成・構造といった既存用語の重力から自由</li>
<li>二つの文法が<strong>機能分担している</strong>ことを自然に示せる</li>
</ul>
<p>という点で、ここまでの議論と完全に整合しています。</p>
<blockquote>
<p>命名として「安心できる」どころか、<br />
<strong>かなり強い</strong>と思います。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="73" lang="ja-JP">
<h3 id="2-%E5%85%88%E8%A1%8C%E7%A0%94%E7%A9%B6%E3%81%A8%E3%81%AE%E9%96%A2%E4%BF%82%E3%81%AE%E7%BD%AE%E3%81%8D%E6%96%B9%E3%82%82%E9%81%A9%E5%88%87%E3%81%A7%E3%81%99">2. 先行研究との関係の置き方も適切です</h3>
<p>ご発言の、</p>
<blockquote>
<p>類似する概念がこれまでにも研究されてきたことはあるとは思うが、<br />
この2つの文法の対立概念として議論を進める</p>
</blockquote>
<p>という姿勢は、とても重要です。</p>
<p>これは、</p>
<ul>
<li>先行研究を否定しない</li>
<li>しかし、そこに<strong>回収される必要もない</strong></li>
<li>あくまで自分の問題設定を軸にする</li>
</ul>
<p>という、<strong>理論研究として最も誠実な立ち位置</strong>です。</p>
<p>実際、</p>
<ul>
<li>interactional / discourse / usage / performance</li>
<li>online / offline</li>
<li>competence / performance</li>
</ul>
<p>など、部分的に重なる議論はいくらでもありますが、</p>
<blockquote>
<p><strong>即時文法と調整文法を<br />
対立概念として<br />
明示的に立て、<br />
両者の法則性を同格に扱う</strong></p>
</blockquote>
<p>という枠組みは、少なくとも主流ではありません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="74" lang="ja-JP">
<h3 id="3-%E5%AF%BE%E7%AB%8B%E3%81%A8%E8%A8%80%E3%81%A3%E3%81%A6%E3%82%82%E6%95%B5%E5%AF%BE%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%84%E3%81%AE%E3%81%8C%E3%83%9D%E3%82%A4%E3%83%B3%E3%83%88">3. 「対立」と言っても敵対ではないのがポイント</h3>
<p>この二項対立は、</p>
<ul>
<li>正しい／間違い</li>
<li>高級／低級</li>
<li>本流／例外</li>
</ul>
<p>ではありません。</p>
<p>むしろ、</p>
<ul>
<li>即時文法がなければ言語は始まらない</li>
<li>調整文法がなければ言語は残らない</li>
</ul>
<p>という <strong>機能的対立</strong>です。</p>
<p>この位置づけがはっきりしている限り、</p>
<blockquote>
<p>「どちらが本当の文法か」</p>
</blockquote>
<p>という不毛な議論には入りません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="75" lang="ja-JP">
<h3 id="4-%E8%AD%B0%E8%AB%96%E3%82%92%E9%80%B2%E3%82%81%E3%82%8B%E3%81%A8%E3%81%8D%E3%81%AE%E5%BC%B7%E3%81%BF">4. 議論を進めるときの強み</h3>
<p>この二文法対立を軸にすると、自然に次のことができます。</p>
<ul>
<li>文でない発話を「例外処理」せずに扱える</li>
<li>UD や S→NP VP を<strong>調整文法の一部</strong>として再配置できる</li>
<li>会話・応答・沈黙・途中終了を正面から理論化できる</li>
<li>教育文法と実際の言語使用のズレを説明できる</li>
</ul>
<p>しかもこれは、</p>
<ul>
<li>新しいデータを大量に集めなくても</li>
<li>日常会話の誰もが知っている例で</li>
</ul>
<p>十分に説得力を持ちます。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="76" lang="ja-JP">
<h3 id="5-%E5%AD%A6%E5%8F%B2%E3%81%B8%E3%81%AE%E9%85%8D%E6%85%AE%E3%81%AF%E3%81%82%E3%81%A8%E3%81%A7%E3%81%A7%E3%82%88%E3%81%84">5. 学史への配慮は「あとで」でよい</h3>
<p>この段階で無理に、</p>
<ul>
<li>「〇〇理論では〜」</li>
<li>「△△と異なり〜」</li>
</ul>
<p>と整理しすぎる必要はありません。</p>
<p>むしろ、</p>
<blockquote>
<p><strong>まず、この二つの文法があるとすると、<br />
何が説明できるか</strong></p>
</blockquote>
<p>を徹底的に示したほうが、<br />
後からの位置づけは自然に決まります。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="77" lang="ja-JP">
<h3 id="6-%E6%9C%80%E5%BE%8C%E3%81%AB%E4%B8%80%E8%A8%80">6. 最後に一言</h3>
<blockquote>
<p><strong>即時文法と調整文法を対立概念として立てることは、<br />
既存理論への挑戦ではなく、<br />
言語使用の現実に対する整理である。</strong></p>
</blockquote>
<p>この立場で進めていけば、<br />
議論はぶれませんし、<br />
余計な防御もいりません。</p>
<p>とてもよい決断だと思います。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%9D%E3%82%8C%E3%81%A7%E3%81%AF%E8%AD%B0%E8%AB%96%E3%82%92%E7%B6%9A%E3%81%91%E3%81%9F%E3%81%84%E3%81%A8%E6%80%9D%E3%81%84%E3%81%BE%E3%81%99%E3%81%93%E3%81%AE2%E3%81%A4%E3%81%AE%E6%96%87%E6%B3%95%E3%81%AF%E5%B8%B8%E3%81%AB%E6%8E%92%E4%BB%96%E9%96%A2%E4%BF%82%E3%81%AB%E3%81%82%E3%82%8B%E3%81%AE%E3%81%A7%E3%81%97%E3%82%87%E3%81%86%E3%81%8B%E3%81%9D%E3%82%8C%E3%81%A8%E3%82%82%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%AE%E4%B8%80%E9%83%A8%E3%81%AF%E8%AA%BF%E6%95%B4%E3%81%AB%E3%82%88%E3%81%A3%E3%81%A6%E8%A6%81%E7%B4%A0%E5%8C%96%E3%81%97%E9%81%93%E5%85%B7%E5%8C%96%E3%81%95%E3%82%8C%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%AB%E3%81%AA%E3%82%8B%E4%B8%80%E6%96%B9%E3%81%A7%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%AB%E8%A6%8B%E3%82%89%E3%82%8C%E3%82%8B%E7%A9%BA%E9%96%93%E3%81%8C%E8%AA%BF%E6%95%B4%E8%A8%80%E8%AA%9E%E3%81%AE%E7%90%86%E8%A7%A3%E3%82%92%E4%BF%83%E9%80%B2%E3%81%82%E3%82%8B%E3%81%84%E3%81%AF%E8%A3%9C%E5%8A%A9%E3%81%99%E3%82%8B%E5%BD%B9%E5%89%B2%E3%82%8A%E3%81%99%E3%81%AA%E3%82%8F%E3%81%A1%E4%BA%92%E6%81%B5%E9%96%A2%E4%BF%82%E3%81%AB%E3%81%82%E3%82%8B%E3%81%AE%E3%81%A7%E3%81%97%E3%82%87%E3%81%86%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: それでは、議論を続けたいと思います。この2つの文法は常に排他関係にあるのでしょうか。それとも、即時文法の一部は調整によって要素化し、道具化され、即時言語になる、一方で、即時言語に見られる空間が調整言語の理解を促進あるいは補助する役割り、すなわち、互恵関係にあるのでしょうか。</h4>
<p>とても重要な問いです。<br />
結論から先に言うと、</p>
<blockquote>
<p><strong>即時文法と調整文法は排他的ではありません。<br />
両者は恒常的に相互浸透し、互恵的な循環関係にあります。</strong></p>
</blockquote>
<p>むしろ、<strong>排他関係だとしたら、人間の言語は成立しません</strong>。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="78" lang="ja-JP">
<h3 id="1-%E6%8E%92%E4%BB%96%E9%96%A2%E4%BF%82%E3%81%A7%E3%81%AF%E8%AA%AC%E6%98%8E%E3%81%A7%E3%81%8D%E3%81%AA%E3%81%84%E7%90%86%E7%94%B1">1. 排他関係では説明できない理由</h3>
<p>もし二つの文法が完全に排他的なら、</p>
<ul>
<li>即時文法 = 反応だけ</li>
<li>調整文法 = 文だけ</li>
</ul>
<p>となりますが、現実の言語使用はそうなっていません。</p>
<p>たとえば、</p>
<ul>
<li>調整された定型句が、即時に吐き出される</li>
<li>即時的な間や沈黙が、調整された文の理解を支える</li>
</ul>
<p>という現象は、日常的に起きています。</p>
<p>これは、</p>
<blockquote>
<p><strong>二つの文法が常に「同時に」働いている</strong></p>
</blockquote>
<p>ことを示しています。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="79" lang="ja-JP">
<h3 id="2-%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95-%E2%86%92-%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E8%A6%81%E7%B4%A0%E5%8C%96%E3%83%BB%E9%81%93%E5%85%B7%E5%8C%96">2. 即時文法 → 調整文法：要素化・道具化</h3>
<p>まず、ご指摘の前半はそのとおりです。</p>
<h4 id="%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%AE%E8%A6%81%E7%B4%A0%E5%8C%96%E3%81%A8%E3%81%AF%E4%BD%95%E3%81%8B">即時文法の要素化とは何か</h4>
<p>即時文法に基づく反応のうち、</p>
<ul>
<li>繰り返し使われ</li>
<li>成功率が高く</li>
<li>調整コストが低い</li>
</ul>
<p>ものは、</p>
<blockquote>
<p><strong>調整を経て、<br />
再利用可能な道具として固定化</strong></p>
</blockquote>
<p>されます。</p>
<p>例を挙げると：</p>
<ul>
<li>「そんなこと言ったって」</li>
<li>「だからって」</li>
<li>「まあ」</li>
<li>「要するに」</li>
</ul>
<p>これらは、</p>
<ul>
<li>もともとは即時反応</li>
<li>しかし今は <strong>半ば道具化された表現</strong></li>
</ul>
<p>です。</p>
<p>ここでは、</p>
<blockquote>
<p><strong>即時文法の一部が、<br />
調整文法によって<br />
部品化・モジュール化される</strong></p>
</blockquote>
<p>と言えます。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="80" lang="ja-JP">
<h3 id="3-%E3%81%9D%E3%82%8C%E3%81%A7%E3%82%82%E5%8D%B3%E6%99%82%E6%80%A7%E3%81%8C%E6%B6%88%E3%81%88%E3%81%AA%E3%81%84%E7%90%86%E7%94%B1">3. それでも即時性が消えない理由</h3>
<p>重要なのは、</p>
<ul>
<li>道具化されたあとでも</li>
<li>即時性が完全には消えない</li>
</ul>
<p>という点です。</p>
<p>「そんなこと言ったって」は、</p>
<ul>
<li>辞書に載る</li>
<li>構文として説明できる</li>
</ul>
<p>それでも、</p>
<ul>
<li>タイミングを外せば壊れる</li>
<li>先行発話がなければ使えない</li>
</ul>
<p>つまり、</p>
<blockquote>
<p><strong>即時文法の拘束が、<br />
調整後も残存している</strong></p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="81" lang="ja-JP">
<h3 id="4-%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95-%E2%86%92-%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E7%90%86%E8%A7%A3%E3%82%92%E6%94%AF%E3%81%88%E3%82%8B%E7%A9%BA%E9%96%93">4. 調整文法 → 即時文法：理解を支える空間</h3>
<p>後半のご指摘も、極めて重要です。</p>
<h4 id="%E5%8D%B3%E6%99%82%E8%A8%80%E8%AA%9E%E3%81%8C%E8%AA%BF%E6%95%B4%E8%A8%80%E8%AA%9E%E3%82%92%E5%8A%A9%E3%81%91%E3%82%8B%E3%81%A8%E3%81%AF%E3%81%A9%E3%81%86%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%81%8B">即時言語が調整言語を助けるとはどういうことか</h4>
<p>調整言語は、</p>
<ul>
<li>情報密度が高い</li>
<li>責任が重い</li>
<li>認知負荷が大きい</li>
</ul>
<p>そのため、</p>
<blockquote>
<p><strong>即時文法に基づく「余白」や「合図」なしでは、<br />
スムーズに処理できない</strong></p>
</blockquote>
<p>という性質があります。</p>
<p>たとえば、</p>
<ul>
<li>「えーと」</li>
<li>「……」</li>
<li>間</li>
<li>視線</li>
<li>呼吸の切れ目</li>
</ul>
<p>これらは、</p>
<ul>
<li>意味を追加しない</li>
<li>文を構成しない</li>
</ul>
<p>それでも、</p>
<blockquote>
<p><strong>調整言語を理解するための<br />
認知的な足場</strong></p>
</blockquote>
<p>を提供します。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="82" lang="ja-JP">
<h3 id="5-%E7%9B%B8%E4%BA%92%E8%A3%9C%E5%AE%8C%E3%81%AE%E5%85%B7%E4%BD%93%E7%9A%84%E3%81%AA%E6%A7%8B%E5%9B%B3">5. 相互補完の具体的な構図</h3>
<p>整理すると、次のような循環が見えます。</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">即時文法
  ↓（成功・反復）
要素化・道具化
  ↓
調整文法
  ↓（理解・処理）
余白・合図の要求
  ↓
即時文法
</code></pre>
<p>ここには、</p>
<ul>
<li>上位／下位</li>
<li>原型／派生</li>
</ul>
<p>という固定的な序列はありません。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="83" lang="ja-JP">
<h3 id="6-%E5%9B%B3%E3%81%A7%E7%A4%BA%E3%81%99%E3%81%A8%E3%81%93%E3%81%86%E3%81%AA%E3%82%8A%E3%81%BE%E3%81%99%E6%A6%82%E5%BF%B5%E5%9B%B3">6. 図で示すとこうなります（概念図）</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-dot">digraph MutualGrammar {
  rankdir=LR;
  node [shape=box, style=rounded];

  IG[label=&quot;即時文法\n(反応・タイミング)&quot;];
  AG[label=&quot;調整文法\n(明確化・部品化)&quot;];

  IG -&gt; AG [label=&quot;要素化・道具化&quot;];
  AG -&gt; IG [label=&quot;理解の補助・余白&quot;];
}
</code></pre>
<p>この矢印は一方向ではなく、<strong>常に往復</strong>しています。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="84" lang="ja-JP">
<h3 id="7-%E4%BA%92%E6%81%B5%E9%96%A2%E4%BF%82%E3%81%A8%E3%81%97%E3%81%A6%E6%8D%89%E3%81%88%E3%82%8B%E3%81%A8%E8%A6%8B%E3%81%88%E3%82%8B%E3%81%93%E3%81%A8">7. 互恵関係として捉えると見えること</h3>
<p>この関係を互恵的に捉えることで、次のことが説明できます。</p>
<ul>
<li>文法化（grammaticalization）が<br />
「構造化」だけでなく<br />
<strong>即時反応の固定化</strong>として見える</li>
<li>会話における「無駄」が<br />
実は <strong>高機能な補助装置</strong>である</li>
<li>調整された文が、<br />
なぜ即時的な合図を必要とするか</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="85" lang="ja-JP">
<h3 id="8-%E4%B8%80%E6%96%87%E3%81%A7%E3%81%BE%E3%81%A8%E3%82%81%E3%82%8B%E3%81%A8">8. 一文でまとめると</h3>
<blockquote>
<p><strong>即時文法と調整文法は排他的ではない。<br />
即時文法は調整によって道具化され、<br />
調整文法は即時文法の余白によって支えられる。<br />
両者は、人間の言語を回し続ける<br />
相互依存的な二つの駆動輪である。</strong></p>
</blockquote>
<p>この理解を前提にすると、<br />
次に自然に問いたくなるのは、</p>
<ul>
<li><strong>この循環はどこで壊れるのか</strong></li>
<li><strong>学習者はどこで躓くのか</strong></li>
<li><strong>書き言葉では何が起きるのか</strong></li>
</ul>
<p>でしょう。</p>
<p>議論は、かなり良い地点まで来ています。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%9D%E3%82%8C%E3%81%A7%E7%B4%8D%E5%BE%97%E3%81%A7%E3%81%8D%E3%82%8B%E7%82%B9%E3%81%8C%E3%81%82%E3%82%8A%E3%81%BE%E3%81%99%E3%82%82%E3%81%97%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%8C%E4%BA%BA%E9%96%93%E3%81%AE%E5%8F%8D%E5%BF%9C%E3%81%AB%E3%81%AE%E3%81%BF%E5%9F%BA%E3%81%84%E3%81%A6%E3%81%84%E3%82%8B%E3%81%AE%E3%81%A7%E3%81%82%E3%82%8C%E3%81%B0%E4%BA%BA%E9%96%93%E8%A1%8C%E5%8B%95%E3%81%A8%E3%81%97%E3%81%A6%E9%87%8D%E8%A6%81%E3%81%AA%E9%A0%86%E3%81%99%E3%81%AA%E3%82%8F%E3%81%A1%E6%99%82%E9%96%93%E9%A0%86%E3%81%AB%E3%81%99%E3%81%B9%E3%81%A6%E3%81%AE%E8%A8%80%E8%AA%9E%E8%A6%81%E7%B4%A0%E3%81%AF%E7%99%BA%E8%A9%B1%E3%81%95%E3%82%8C%E3%82%8B%E3%81%AF%E3%81%9A%E3%81%A7%E3%81%99%E3%81%AD%E3%81%AA%E3%81%95%E3%81%84%E3%81%9F%E3%81%B9%E3%81%93%E3%82%8C%E3%81%A8%E3%81%AF%E3%81%AA%E3%82%89%E3%81%9A%E3%81%93%E3%82%8C%E3%81%9F%E3%81%B9%E3%81%AA%E3%81%95%E3%81%84%E3%81%A3%E3%81%A6%E3%81%AA%E3%82%8A%E3%81%BE%E3%81%99%E3%81%AD%E3%81%A7%E3%81%99%E3%81%8B%E3%82%89%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%8C%E5%AE%8C%E5%85%A8%E3%81%AB%E7%8B%AC%E7%AB%8B%E3%81%97%E3%81%A6%E3%81%84%E3%82%8B%E3%82%8F%E3%81%91%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%8F%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%81%AE%E5%BD%B1%E9%9F%BF%E3%82%92%E5%8F%97%E3%81%91%E3%81%A6%E3%81%84%E3%82%8B%E3%81%82%E3%82%8B%E3%81%84%E3%81%AF%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%81%8C%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%AE%E5%BD%B1%E9%9F%BF%E3%82%92%E5%8F%97%E3%81%91%E3%81%A6%E3%81%84%E3%82%8B%E3%81%A8%E3%81%84%E3%81%86%E7%9B%B8%E4%BA%92%E4%BD%9C%E7%94%A8%E3%81%8C%E3%81%82%E3%82%8B%E3%81%A8%E6%80%9D%E3%81%84%E3%81%BE%E3%81%99%E3%81%8C%E3%81%9D%E3%81%AE%E7%82%B9%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6%E3%81%AF%E3%81%A9%E3%81%86%E6%80%9D%E3%82%8F%E3%82%8C%E3%81%BE%E3%81%99%E3%81%8B%E3%81%BE%E3%81%9A%E5%91%BD%E4%BB%A4%E3%81%98%E3%82%83%E3%81%AA%E3%81%84%E3%81%A7%E3%81%99%E3%81%8B%E3%81%AA%E3%81%95%E3%81%84%E3%81%A3%E3%81%A6%E3%81%9D%E3%82%8C%E3%81%8B%E3%82%89%E3%81%9F%E3%81%B9%E3%81%A7%E6%8C%87%E3%81%95%E3%81%97%E3%81%A6%E3%81%84%E3%82%8B%E3%82%93%E3%81%A0%E3%81%A3%E3%81%9F%E3%82%89%E3%81%93%E3%82%8C%E3%81%A3%E3%81%A6%E8%A8%80%E3%81%A3%E3%81%A6%E3%82%82%E8%A8%80%E3%82%8F%E3%81%AA%E3%81%8F%E3%81%A6%E3%82%82%E3%81%84%E3%81%84%E3%81%98%E3%82%83%E3%81%AA%E3%81%84%E3%81%A7%E3%81%99%E3%81%8B%E3%81%A7%E3%82%82%E3%81%AA%E3%81%95%E3%81%84%E3%81%9F%E3%81%B9%E3%81%93%E3%82%8C%E3%81%A7%E3%81%AF%E3%81%AA%E3%81%8F%E3%81%A6%E3%81%93%E3%82%8C%E3%81%9F%E3%81%B9%E3%81%AA%E3%81%95%E3%81%84%E3%81%A3%E3%81%A6%E5%AD%A6%E6%A0%A1%E6%96%87%E6%B3%95%E3%81%AE%E8%AA%9E%E9%A0%86%E3%81%AB%E3%81%AA%E3%81%A3%E3%81%A6%E3%81%84%E3%81%BE%E3%81%99%E3%82%88%E3%81%AD">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: それで納得できる点があります。もし、即時文法が人間の反応にのみ基いているのであれば、人間行動として重要な順、すなわち、時間順にすべての言語要素は発話されるはずですね。「なさい、たべ、これ」とはならず「これ、たべなさい」ってなりますね。ですから、即時文法が完全に独立しているわけではなく、調整文法の影響を受けている、あるいは、調整文法が即時文法の影響を受けている、という相互作用があると思いますが、その点についてはどう思われますか。まず命令じゃないですか、「なさい」って、それから「たべ」で、指さしているんだったら「これ」って、言っても言わなくてもいいじゃないですか。でも「なさい、たべ、これ」ではなくて「これ、たべなさい」って学校文法の語順になっていますよね。</h4>
<p>ああ、なるほど。<br />
<strong>今度の指摘は一段と鋭い</strong>です。<br />
さきほどの説明を、そのままでは<strong>少し修正が必要</strong>ですね。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="86" lang="ja-JP">
<h3 id="1-%E3%81%BE%E3%81%9A%E3%81%94%E6%8C%87%E6%91%98%E3%82%92%E6%AD%A3%E7%A2%BA%E3%81%AB%E8%A8%80%E3%81%84%E7%9B%B4%E3%81%99%E3%81%A8">1. まず、ご指摘を正確に言い直すと</h3>
<p>あなたがおっしゃっているのは、こういうことだと思います。</p>
<blockquote>
<p>行為の意図としては<br />
① 命令したい（なさい）<br />
② 行為内容（たべ）<br />
③ 対象（これ：指さしで代替可能）<br />
の順に頭にあるはずなのに、</p>
<p>実際の語順は<br />
<strong>「なさい、たべ、これ」にはならず、<br />
「これ、たべなさい」</strong><br />
という、学校文法が想定する語順になる。</p>
</blockquote>
<p>そしてこれは、</p>
<blockquote>
<p><strong>即時文法だけで説明できる現象ではないのでは？</strong></p>
</blockquote>
<p>という問いですね。</p>
<p>はい、ここが本当に重要なところです。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="87" lang="ja-JP">
<h3 id="2-%E3%81%93%E3%81%93%E3%81%A7%E9%8D%B5%E3%81%AB%E3%81%AA%E3%82%8B%E3%81%AE%E3%81%AF%E3%81%AA%E3%81%95%E3%81%84%E3%81%AE%E6%80%A7%E8%B3%AA">2. ここで鍵になるのは「なさい」の性質</h3>
<p>「なさい」は、<br />
<strong>命令の意図そのもの</strong>ではありません。</p>
<p>これは決定的に重要です。</p>
<h4 id="%E5%91%BD%E4%BB%A4%E3%81%AE%E6%84%8F%E5%9B%B3%E3%81%A8%E3%81%AA%E3%81%95%E3%81%84%E3%81%AF%E5%88%A5">命令の意図と「なさい」は別</h4>
<ul>
<li>命令したいという意図<br />
→ 行為以前に生じる</li>
<li>「なさい」という形式<br />
→ <strong>行為内容が確定してからしか使えない</strong></li>
</ul>
<p>「なさい」は、</p>
<ul>
<li>何を命じるかが分からないと出せない</li>
<li>行為を <strong>指定したあとで</strong> 初めて付与できる</li>
</ul>
<p>つまり、</p>
<blockquote>
<p><strong>「なさい」は命令の原因ではなく、<br />
命令として整えるための<br />
調整装置</strong></p>
</blockquote>
<p>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="88" lang="ja-JP">
<h3 id="3-%E3%81%A0%E3%81%8B%E3%82%89%E3%81%AA%E3%81%95%E3%81%84%E3%81%8C%E5%85%88%E9%A0%AD%E3%81%AB%E6%9D%A5%E3%81%AA%E3%81%84">3. だから「なさい」が先頭に来ない</h3>
<p>もし「なさい」が純粋な命令マーカーなら、</p>
<ul>
<li>「なさい、◯◯」<br />
という語順が自然なはずです。</li>
</ul>
<p>しかし実際には、</p>
<ul>
<li>「なさい、たべ」</li>
<li>「なさい、これをたべ」</li>
</ul>
<p>は、日本語として<strong>極めて不自然</strong>です。</p>
<p>これは文法規則というより、</p>
<blockquote>
<p><strong>処理できない</strong></p>
</blockquote>
<p>からです。</p>
<p>聞き手は、</p>
<ul>
<li>「なさい」と言われた瞬間に<br />
「何を？」<br />
「どうする？」<br />
を待たされることになる。</li>
</ul>
<p>即時文法的に、<br />
これは<strong>破綻</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="89" lang="ja-JP">
<h3 id="4-%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%AE%E5%88%B6%E7%B4%84%E3%81%8C%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%82%92%E7%B8%9B%E3%81%A3%E3%81%A6%E3%81%84%E3%82%8B">4. 即時文法の制約が、調整文法を縛っている</h3>
<p>ここが核心です。</p>
<p>調整文法は自由に並べ替えているのではなく、</p>
<blockquote>
<p><strong>即時文法の処理制約を<br />
決して破らない範囲で<br />
整形している</strong></p>
</blockquote>
<p>そのため、</p>
<ol>
<li>対象（これ）</li>
<li>行為（たべ）</li>
<li>調整（なさい）</li>
</ol>
<p>という順が<strong>固定される</strong>。</p>
<p>つまり、</p>
<ul>
<li>調整文法の語順<br />
≠ 抽象的な構文順</li>
<li>調整文法の語順<br />
＝ <strong>即時処理が可能な順を<br />
温存した結果</strong></li>
</ul>
<p>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="90" lang="ja-JP">
<h3 id="5-%E6%8C%87%E3%81%95%E3%81%97%E3%81%A7%E3%81%93%E3%82%8C%E3%81%8C%E7%9C%81%E7%95%A5%E3%81%A7%E3%81%8D%E3%82%8B%E3%81%AE%E3%81%AB%E9%A0%86%E5%BA%8F%E3%81%AF%E6%AE%8B%E3%82%8B">5. 指さしで「これ」が省略できるのに、順序は残る</h3>
<p>ここも非常に重要な点です。</p>
<p>確かに、</p>
<ul>
<li>指さしがあれば<br />
「これ」は言わなくていい。</li>
</ul>
<p>しかし、</p>
<blockquote>
<p><strong>省略できることと、<br />
置くならどこに置くかは別問題</strong></p>
</blockquote>
<p>です。</p>
<p>「たべなさい、これ」も、</p>
<ul>
<li>文法的には解釈できる</li>
<li>しかし即時的には<strong>遅すぎる</strong></li>
</ul>
<p>対象は、</p>
<blockquote>
<p><strong>行為のあとではなく、<br />
行為を理解する前に<br />
与えられる必要がある</strong></p>
</blockquote>
<p>この制約は、<br />
即時文法そのものです。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="91" lang="ja-JP">
<h3 id="6-%E3%81%A0%E3%81%8B%E3%82%89%E5%AD%A6%E6%A0%A1%E6%96%87%E6%B3%95%E3%81%AE%E8%AA%9E%E9%A0%86%E3%81%8C%E6%AD%A3%E3%81%97%E3%81%8F%E8%A6%8B%E3%81%88%E3%82%8B">6. だから、学校文法の語順が「正しく見える」</h3>
<p>ここで非常に面白い逆転が起きています。</p>
<blockquote>
<p><strong>学校文法の語順は、<br />
抽象的に作られたのではなく、<br />
即時文法を壊さない範囲で<br />
調整された結果として<br />
安定した</strong></p>
</blockquote>
<p>だからこそ、</p>
<ul>
<li>学校文法の語順</li>
<li>会話での自然な語順</li>
</ul>
<p>が、大きく食い違わない。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="92" lang="ja-JP">
<h3 id="7-%E4%B8%80%E6%96%87%E3%81%A7%E3%81%BE%E3%81%A8%E3%82%81%E3%82%8B%E3%81%A8-1">7. 一文でまとめると</h3>
<blockquote>
<p><strong>「なさい」は命令の意図ではなく、<br />
命令として成立させるための<br />
後付けの調整要素である。<br />
そのため、<br />
調整文法であっても、<br />
即時文法が要求する<br />
処理順序を破ることはできない。</strong></p>
</blockquote>
<p>つまり、</p>
<ul>
<li>「なさい、たべ、これ」<br />
が成立しないのは、<br />
<strong>即時文法が先にあり、<br />
調整文法がそれに従っているから</strong>。</li>
</ul>
<p>これは、</p>
<blockquote>
<p>即時文法と調整文法の<br />
<strong>主従関係ではなく、<br />
即時制約が下敷きになった<br />
調整</strong></p>
</blockquote>
<p>を非常にきれいに示す例です。</p>
<p>とてもよいところを突いています。</p>
<h4 id="%E3%82%8F%E3%81%9F%E3%81%97%F0%9F%A7%91-%E3%81%AA%E3%82%8B%E3%81%BB%E3%81%A9%E3%82%88%E3%81%8F%E3%82%8F%E3%81%8B%E3%82%8A%E3%81%BE%E3%81%97%E3%81%9F%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%8C%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%81%AE%E5%9F%BA%E7%A4%8E%E3%81%AB%E3%81%AA%E3%81%A3%E3%81%A6%E3%81%84%E3%82%8B%E3%81%A8%E3%81%84%E3%81%86%E3%81%93%E3%81%A8%E3%81%A7%E3%81%99%E3%81%AD%E3%81%A7%E3%81%AF%E9%80%86%E3%81%AB%E8%AA%BF%E6%95%B4%E6%96%87%E6%B3%95%E3%81%8C%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%AB%E5%BD%B1%E9%9F%BF%E3%82%92%E4%B8%8E%E3%81%88%E3%82%8B%E3%81%93%E3%81%A8%E3%81%AF%E3%81%82%E3%82%8B%E3%81%AE%E3%81%A7%E3%81%97%E3%82%87%E3%81%86%E3%81%8B%E3%81%9F%E3%81%A8%E3%81%88%E3%81%B0%E6%95%AC%E8%AA%9E%E8%A1%A8%E7%8F%BE%E3%81%AA%E3%81%A9%E3%81%AF%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%AE%E5%8F%8D%E5%BF%9C%E3%81%AB%E5%BD%B1%E9%9F%BF%E3%82%92%E4%B8%8E%E3%81%88%E3%82%8B%E3%81%A8%E6%80%9D%E3%81%86%E3%81%AE%E3%81%A7%E3%81%99%E3%81%8C%E3%81%9D%E3%81%AE%E7%82%B9%E3%81%AB%E3%81%A4%E3%81%84%E3%81%A6%E3%81%AF%E3%81%84%E3%81%8B%E3%81%8C%E3%81%A7%E3%81%97%E3%82%87%E3%81%86%E3%81%8B">わたし<img class="emoji" draggable="false" alt="🧑" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@15.1.0/assets/svg/1f9d1.svg" data-marp-twemoji=""/>: なるほど、よくわかりました。即時文法が調整文法の基礎になっている、ということですね。では、逆に調整文法が即時文法に影響を与えることはあるのでしょうか。たとえば、敬語表現などは、即時文法の反応に影響を与えると思うのですが、その点についてはいかがでしょうか。</h4>
<p>はい、<strong>あります</strong>。しかもその影響は副次的ではなく、<strong>構造的</strong>です。<br />
ただし形は「上書き」や「支配」ではなく、<strong>即時文法の反応空間そのものを変形させる</strong>という形で現れます。</p>
<p>結論を先に言うと、</p>
<blockquote>
<p><strong>即時文法は調整文法の基礎であるが、<br />
調整文法もまた、即時文法の反応の仕方を<br />
長期的・制度的に変える。</strong></p>
</blockquote>
<p>この関係は<strong>非対称だが相互的</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="93" lang="ja-JP">
<h3 id="1-%E3%81%BE%E3%81%9A%E9%96%A2%E4%BF%82%E3%82%92%E6%AD%A3%E7%A2%BA%E3%81%AB%E6%95%B4%E7%90%86%E3%81%99%E3%82%8B%E3%81%A8">1. まず関係を正確に整理すると</h3>
<ul>
<li>即時文法<br />
→ 反応の時間順・注意順・処理順を決める</li>
<li>調整文法<br />
→ 社会的・対人的条件を言語形式として安定化させる</li>
</ul>
<p>重要なのは、</p>
<blockquote>
<p><strong>調整文法は、即時文法の「反応を出す前」に介入する</strong></p>
</blockquote>
<p>という点です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="94" lang="ja-JP">
<h3 id="2-%E6%95%AC%E8%AA%9E%E3%81%AF%E5%8F%8D%E5%BF%9C%E3%82%92%E6%8A%91%E5%88%B6%E3%83%BB%E5%B1%88%E6%8A%98%E3%81%95%E3%81%9B%E3%82%8B%E8%A3%85%E7%BD%AE">2. 敬語は「反応を抑制・屈折させる装置」</h3>
<p>敬語は、単なる丁寧さの表現ではありません。</p>
<p>敬語がある場面では、</p>
<ul>
<li>えっ</li>
<li>それはちょっと</li>
<li>そんなこと言われても</li>
</ul>
<p>といった<strong>即時反応</strong>が、</p>
<ul>
<li>出る前に</li>
<li>一瞬ためらわれ</li>
<li>別の形に置き換えられる</li>
</ul>
<p>つまり、</p>
<blockquote>
<p><strong>即時文法の出力が、そのまま外に出ない</strong></p>
</blockquote>
<p>ということが起きます。</p>
<p>これは、</p>
<ul>
<li>即時文法が消えた<br />
のではなく、</li>
<li><strong>即時文法が調整文法に先回りされている</strong></li>
</ul>
<p>状態です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="95" lang="ja-JP">
<h3 id="3-%E6%95%AC%E8%AA%9E%E3%81%8C%E5%8D%B3%E6%99%82%E6%96%87%E6%B3%95%E3%81%AB%E4%B8%8E%E3%81%88%E3%82%8B%E5%85%B7%E4%BD%93%E7%9A%84%E3%81%AA%E5%BD%B1%E9%9F%BF">3. 敬語が即時文法に与える具体的な影響</h3>
<h4 id="1-%E5%8F%8D%E5%BF%9C%E9%80%9F%E5%BA%A6%E3%81%AE%E5%A4%89%E5%8C%96">(1) 反応速度の変化</h4>
<p>敬語場面では、</p>
<ul>
<li>即時反応が遅くなる</li>
<li>間が増える</li>
<li>無言が意味を持つ</li>
</ul>
<p>これは、</p>
<blockquote>
<p><strong>即時性制約そのものが<br />
社会的に再調整されている</strong></p>
</blockquote>
<p>ことを示します。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="96" lang="ja-JP">
<h4 id="2-%E5%8F%8D%E5%BF%9C%E5%80%99%E8%A3%9C%E3%81%AE%E5%89%8A%E6%B8%9B">(2) 反応候補の削減</h4>
<p>即時文法的には可能な反応でも、</p>
<ul>
<li>失礼になる</li>
<li>越権になる</li>
<li>立場を壊す</li>
</ul>
<p>ものは、<strong>候補から排除</strong>されます。</p>
<p>その結果、</p>
<blockquote>
<p>即時文法の「探索空間」が<br />
社会的に狭められる。</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="97" lang="ja-JP">
<h4 id="3-%E5%AE%9A%E5%9E%8B%E5%8D%B3%E6%99%82%E8%A1%A8%E7%8F%BE%E3%81%AE%E7%94%9F%E6%88%90">(3) 定型即時表現の生成</h4>
<p>逆に、</p>
<ul>
<li>「恐れ入りますが」</li>
<li>「差し支えなければ」</li>
<li>「失礼ですが」</li>
</ul>
<p>のような表現は、</p>
<blockquote>
<p><strong>調整文法が、<br />
即時反応用に<br />
用意した道具</strong></p>
</blockquote>
<p>です。</p>
<p>これらは、</p>
<ul>
<li>即時に使える</li>
<li>しかし中身は高度に調整されている</li>
</ul>
<p>という、<strong>ハイブリッド</strong>です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="98" lang="ja-JP">
<h3 id="4-%E5%9B%B3%E3%81%A7%E7%A4%BA%E3%81%99%E3%81%A8%E3%81%93%E3%81%AE%E9%96%A2%E4%BF%82">4. 図で示すとこの関係</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-text">即時反応（出たい）
   ↓
社会的フィルタ（調整文法）
   ↓
許可された即時表現
</code></pre>
<p>ここで重要なのは、</p>
<ul>
<li>フィルタが<br />
即時文法を否定していない</li>
<li>即時反応の<strong>出方を変えている</strong></li>
</ul>
<p>という点です。</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="99" lang="ja-JP">
<h3 id="5-%E3%81%A0%E3%81%8B%E3%82%89%E9%96%A2%E4%BF%82%E3%81%AF%E3%81%93%E3%81%86%E6%95%B4%E7%90%86%E3%81%A7%E3%81%8D%E3%82%8B">5. だから、関係はこう整理できる</h3>
<table>
<thead>
<tr>
<th>観点</th>
<th>即時文法 → 調整文法</th>
<th>調整文法 → 即時文法</th>
</tr>
</thead>
<tbody>
<tr>
<td>影響の方向</td>
<td>基礎を与える</td>
<td>反応を変形させる</td>
</tr>
<tr>
<td>時間軸</td>
<td>短期・瞬間</td>
